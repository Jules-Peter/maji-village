// ══ EVENT/ISSUES BAR ══
function updateEventBar(){
  const el=document.getElementById('event-bar');
  // ─ HEALTH STATUS BARS ─
  const mo=((S.month-1)%12)+1;
  const season=[12,1,2].includes(mo)?'hot':[3,4].includes(mo)?'cool':[5,6,7,8].includes(mo)?'wet':'dry';
  const sCol={hot:'#ef5350',cool:'#42a5f5',wet:'#66bb6a',dry:'#ffa726'}[season];
  const sNm={hot:'Hot / Dry',cool:'Cool',wet:'Rainy',dry:'Dry'}[season];
  const bars=[
    {nm:'Disease Risk',v:S.disease,col:S.disease>50?'#ef5350':S.disease>25?'#ffa726':'#66bb6a',bad:true},
    {nm:'Sanitation',v:S.san,col:S.san>60?'#66bb6a':S.san>30?'#ffa726':'#ef5350'},
    {nm:'Water Quality',v:S.waterQ,col:S.waterQ>60?'#42a5f5':S.waterQ>30?'#ffa726':'#ef5350'},
    {nm:'Open Defecation',v:S.od,col:S.od>40?'#ef5350':S.od>15?'#ffa726':'#66bb6a',bad:true},
    {nm:'Helminth Risk',v:S.helm,col:S.helm>40?'#ef5350':S.helm>20?'#ffa726':'#66bb6a',bad:true},
  ];
  let hbHTML=`<div class="hb"><div class="hb-title">Health Status <span class="hb-season" style="background:${sCol}">${sNm}</span></div>`;
  for(const b of bars){
    const pct=Math.max(0,Math.min(100,Math.round(b.v)));
    hbHTML+=`<div class="hb-row"><span class="hb-val" style="color:${b.col}">${b.nm}</span><div class="hb-track"><div class="hb-fill" style="width:${pct}%;background:${b.col}"></div></div><span class="hb-val">${pct}%</span></div>`;
  }
  hbHTML+=`</div>`;

  // ─ ECONOMY SUMMARY ─
  let maintCost=0;for(const bb of buildings){if(bb.built>=1)maintCost+=BD[bb.type].maint||0;}
  const taxIncome=Math.floor(S.pop*5)+20;
  let buildingIncome=0;
  for(const bb of buildings){if(bb.built<1)continue;const lv=bb.level||1;
    if(bb.type==='marketplace')buildingIncome+=15*lv;
    if(bb.type==='tradingpost')buildingIncome+=20*lv;
    if(bb.type==='inn')buildingIncome+=12*lv;
    if(bb.type==='market')buildingIncome+=15*lv;
    if(bb.type==='workshop'&&R.wood>=3&&R.stone>=1)buildingIncome+=30*lv;
    if(bb.type==='pottery'&&R.clay>=2)buildingIncome+=25*lv;
  }
  const netIncome=taxIncome+buildingIncome-maintCost;
  const netCol=netIncome>=0?'#66bb6a':'#ef5350';
  hbHTML+=`<div class="hb"><div class="hb-title">\u{1FA99} Economy</div>`;
  hbHTML+=`<div style="font-size:9px;color:#aaa;line-height:1.6">`;
  hbHTML+=`<div style="display:flex;justify-content:space-between"><span>Tax (${S.pop} pop)</span><span style="color:#66bb6a">+${taxIncome}</span></div>`;
  if(buildingIncome>0)hbHTML+=`<div style="display:flex;justify-content:space-between"><span>Buildings</span><span style="color:#66bb6a">+${buildingIncome}</span></div>`;
  if(maintCost>0)hbHTML+=`<div style="display:flex;justify-content:space-between"><span>Maintenance</span><span style="color:#ef5350">-${maintCost}</span></div>`;
  hbHTML+=`<div style="display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.1);margin-top:2px;padding-top:2px;font-weight:700"><span>Net/month</span><span style="color:${netCol}">${netIncome>=0?'+':''}${netIncome}</span></div>`;
  hbHTML+=`<div style="font-size:8px;color:#666;margin-top:3px">Sell resources at World Market \u2192</div>`;
  hbHTML+=`</div></div>`;

  // ─ FOOD BALANCE ─
  const totalFoodNow=(R.food||0)+(R.meat||0)+(R.fish||0)+(R.vegetables||0)+(R.fruit||0)+(R.eggs||0)+(R.berries||0)+(R.milk||0)+(R.cheese||0);
  const foodWorkersNow=villagers.filter(v=>['farm','fish','hunt','gather','makecheese'].includes(v.task)).length;
  const foodCapNow=foodWorkersNow*3;
  const foodPerPopNow=S.pop>0?totalFoodNow/S.pop:99;
  const foodCol=foodPerPopNow>=3?'#66bb6a':foodPerPopNow>=1.5?'#ffa726':'#ef5350';
  const foodStatus=foodPerPopNow>=3?'Surplus':foodPerPopNow>=1.5?'Adequate':'Shortage!';
  hbHTML+=`<div class="hb"><div class="hb-title">\u{1F33E} Food Balance</div>`;
  hbHTML+=`<div style="font-size:9px;color:#aaa;line-height:1.6">`;
  hbHTML+=`<div style="display:flex;justify-content:space-between"><span>Stockpile</span><span>${totalFoodNow}</span></div>`;
  hbHTML+=`<div style="display:flex;justify-content:space-between"><span>Population</span><span>${S.pop}</span></div>`;
  hbHTML+=`<div style="display:flex;justify-content:space-between"><span>Food workers</span><span>${foodWorkersNow} (feed ~${foodCapNow})</span></div>`;
  hbHTML+=`<div style="display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.1);margin-top:2px;padding-top:2px;font-weight:700"><span>Status</span><span style="color:${foodCol}">${foodStatus}</span></div>`;
  if(foodPerPopNow<1.5&&S.pop>2)hbHTML+=`<div style="font-size:8px;color:#ef5350;margin-top:3px">\u26A0 Villagers may leave! Assign more farmers/hunters/fishers</div>`;
  hbHTML+=`</div></div>`;

  const issues=[];
  // Critical issues
  if(S.disease>60)issues.push({t:'Disease Outbreak',d:`Disease: ${Math.round(S.disease)}% — build Clinic, improve sanitation`,c:'crit'});
  if(S.od>50)issues.push({t:'Open Defecation',d:`OD: ${Math.round(S.od)}% — build Latrines!`,c:'crit'});
  if(R.food<=0&&R.fish<=0&&R.meat<=0&&R.vegetables<=0)issues.push({t:'Famine!',d:'No food — assign farmers, hunters, or fishers NOW',c:'crit'});
  if(R.water<=0)issues.push({t:'No Water!',d:'Assign water carriers or build wells',c:'crit'});
  if(foodPerPopNow<1.5&&S.pop>2)issues.push({t:'Food Shortage!',d:`Only ${totalFoodNow} food for ${S.pop} people — villagers will leave!`,c:'crit'});
  // Warnings
  if(S.helm>40)issues.push({t:'Helminth Infection',d:`Helminths: ${Math.round(S.helm)}% — sanitation needed`,c:'warn'});
  if(S.waterQ<40)issues.push({t:'Poor Water Quality',d:`Water quality: ${Math.round(S.waterQ)}% — build drains, treatment`,c:'warn'});
  if(totalFoodNow<S.pop*3&&totalFoodNow>=S.pop*1.5)issues.push({t:'Food Running Low',d:`${totalFoodNow} food for ${S.pop} people — assign more food workers`,c:'warn'});
  if(foodWorkersNow<Math.ceil(S.pop/3)&&S.pop>4)issues.push({t:'Not Enough Food Workers',d:`${foodWorkersNow} workers feed ~${foodCapNow}, need to feed ${S.pop}`,c:'warn'});
  if(S.pop>0&&S.pop>=S.housing)issues.push({t:'Housing Full',d:`${S.pop}/${S.housing} — build more huts`,c:'warn'});
  const latrines=countBuilt('latrine');const latrineNeed=Math.ceil(S.pop/8);
  if(S.pop>5&&latrines<latrineNeed)issues.push({t:'Need More Latrines',d:`Have ${latrines}, need ${latrineNeed} for ${S.pop} people`,c:'warn'});
  const totalWaste=getTotalLatrineWaste();const totalCap=getTotalLatrineCap();
  if(totalCap>0&&totalWaste>totalCap*0.7)issues.push({t:'Latrines Filling Up',d:`Waste: ${totalWaste}/${totalCap} — assign haulers!`,c:'warn'});
  if(R.water>0&&R.water>=getStorageCap('water')*0.9)issues.push({t:'Water Storage Full',d:'Build a Reservoir for more capacity',c:'info'});
  if(R.wood>0&&R.wood>=getStorageCap('wood')*0.9)issues.push({t:'Wood Storage Full',d:'Build Forestry Hut for more storage',c:'info'});
  // Economy warnings and tips
  if(R.coin<50&&S.pop>5)issues.push({t:'Low on Coins!',d:'Sell resources at World Market, build Workshop/Trading Post/Pottery',c:'warn'});
  if(netIncome<0)issues.push({t:'Losing Money!',d:`-${Math.abs(netIncome)}/month. Build income buildings or sell resources`,c:'warn'});
  if(!hasBuilt('tradingpost')&&!hasBuilt('workshop')&&!hasBuilt('pottery')&&!hasBuilt('marketplace')&&S.pop>8)issues.push({t:'No Income Buildings',d:'Build Market Stall (+10/mo), Workshop (+30/mo), or Pottery (+25/mo)',c:'info'});
  // Defense warnings
  const defScore=getDefenseScore();
  const totalRes=R.coin+(R.wood||0)*2+(R.food||0)*3;
  if(S.pop>=15&&totalRes>400){
    if(defScore<10)issues.push({t:'Village Unprotected!',d:`Defense: ${defScore}. Build walls, guard posts, or assign guards!`,c:'crit'});
    else if(defScore<25)issues.push({t:'Weak Defenses',d:`Defense: ${defScore}. Bandits may attack — build more protection!`,c:'warn'});
    else issues.push({t:'Defense: '+defScore,d:'Village is protected against raids',c:'info'});
  }
  // Goals/missions
  if(!hasBuilt('latrine'))issues.push({t:'Mission: Build a Latrine',d:'Reduce open defecation',c:'goal'});
  else if(!hasBuilt('well'))issues.push({t:'Mission: Build a Well',d:'Clean water source for villagers',c:'goal'});
  else if(!hasBuilt('farm')&&!hasBuilt('fishinghut'))issues.push({t:'Mission: Food Production',d:'Build a Farm or Fishing Hut',c:'goal'});
  else if(!hasBuilt('school'))issues.push({t:'Mission: Build a School',d:'Education unlocks sustainability',c:'goal'});
  else if(!hasBuilt('compost')&&!hasBuilt('treatment'))issues.push({t:'Mission: Waste Treatment',d:'Build Compost Site or Treatment Plant',c:'goal'});
  else if(S.phase<1)issues.push({t:'Mission: Reach Phase 2',d:'Improve sanitation to 30+, water quality 40+',c:'goal'});
  else if(!hasBuilt('clinic'))issues.push({t:'Mission: Build a Clinic',d:'Reduce disease and helminth',c:'goal'});
  else if(S.phase<2)issues.push({t:'Mission: Reach Phase 3',d:'Advanced infrastructure needed',c:'goal'});
  else issues.push({t:'Village Thriving!',d:'Keep growing and improving',c:'info'});
  // Profession stats
  const profs={};for(const v of villagers){if(v.prof)profs[v.prof]=(profs[v.prof]||0)+1;}
  const idle=villagers.filter(v=>v.task==='idle'&&!v.isChild&&!v.prof).length;
  if(idle>2)issues.push({t:idle+' Idle Villagers',d:'Assign them professions!',c:'info'});

  el.innerHTML=hbHTML+issues.map(i=>`<div class="evt evt-${i.c}"><div class="evt-t">${i.t}</div><div class="evt-d">${i.d}</div></div>`).join('');
}

window._sellRes=function(res,pr){

  updateMarketPopup();updateHUD();
};

// ══ FESTIVAL ══
function startFestival(){
  if(festivalTimer>0){msg('Festival already in progress!','warn');return;}
  const cost=100;
  if(R.coin<cost){msg('Need '+cost+' coins for a festival!','bad');return;}
  R.coin-=cost;
  festivalTimer=300; // ~5 seconds at speed 1
  festivalBirthBoost=6; // months of doubled birthrate
  msg('Festival! Everyone is dancing! Birthrate doubled!','good');
  // Make all villagers dance (interrupt their current task briefly)
  for(const v of villagers){
    v._preFestTask=v.task;v._preFestTarget=v.target;v._preFestTx=v.tx;v._preFestTy=v.ty;
    v.task='dance';v.target=null;v.taskTimer=0;
  }
  document.getElementById('festival-btn').classList.add('cooldown');
  updateHUD();
}

function msg(text,type){
  const el=document.createElement('div');el.className='msg msg-'+(type||'info');el.textContent=text;
  document.getElementById('msg-log').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),500);},4000);
  // Keep max 6
  const log=document.getElementById('msg-log');
  while(log.children.length>6)log.firstChild.remove();
}

function setSpeed(s){speed=s;document.querySelectorAll('.sc').forEach((el,i)=>{el.classList.toggle('active',[0,1,3,6].indexOf(s)===i);});}

// ══ GAME LOOP ══
function loop(){
  if(speed>0){
    tick+=speed;mTimer+=speed;
    updateVillagers();
    updateAnimals();
    updateTraders();
    // Festival countdown
    if(festivalTimer>0){
      festivalTimer-=speed;
      if(festivalTimer<=0){
        festivalTimer=0;
        // Restore villager tasks
        for(const v of villagers){
          if(v.task==='dance'){
            v.task=v._preFestTask||'idle';v.target=v._preFestTarget||null;
            v.tx=v._preFestTx||v.x;v.ty=v._preFestTy||v.y;v.taskTimer=0;
          }
          delete v._preFestTask;delete v._preFestTarget;delete v._preFestTx;delete v._preFestTy;
        }
        document.getElementById('festival-btn').classList.remove('cooldown');
        msg('Festival ended — villagers return to work!','info');
      }
    }
    if(mTimer>=MT){mTimer=0;advanceMonth();}
  }else tick+=0.3;
  render();updateHUD();if(tick%30<1)updateEventBar();
  if(selected&&selected.hp!==undefined)updateSelPanel();
  requestAnimationFrame(loop);
}

    name:villageName,R:{...R},S:{...S},tick,mTimer,camX,camY,camZ,
    buildings:buildings.map(b=>({type:b.type,x:b.x,y:b.y,built:b.built,hp:b.hp,level:b.level||1,waste:b.waste||0,wasteStored:b.wasteStored||0,compostProduced:b.compostProduced||0,rawWaste:b.rawWaste||0})),
    huts:huts.map(h=>({x:h.x,y:h.y,level:h.level,size:h.size,shape:h.shape})),
    trees:trees.map(t=>({x:t.x,y:t.y,s:t.s,sw:t.sw,type:t.type,wood:t.wood,maxWood:t.maxWood,dense:t.dense||false})),
    rocks:rocks.map(r=>({x:r.x,y:r.y,s:r.s,stone:r.stone,clay:r.clay,isClay:r.isClay||false})),
    villagers:villagers.map(v=>({x:v.x,y:v.y,skin:v.skin,shirt:v.shirt,wrap:v.wrap,sz:v.sz,isChild:v.isChild,hp:v.hp,hunger:v.hunger,thirst:v.thirst,task:v.task,edu:v.edu||0,speed:v.speed,sick:v.sick,prof:v.prof||null,dietDiv:v.dietDiv||0})),
    animals:animals.map(a=>({type:a.type,x:a.x,y:a.y,hp:a.hp,state:a.state,sz:a.sz,speed:a.speed,dmg:a.dmg,huntRadius:a.huntRadius,fleeRadius:a.fleeRadius,_homeX:a._homeX,_homeY:a._homeY})),
    pipes:pipes.map(p=>({from:{x:p.from.x,y:p.from.y},to:{x:p.to.x,y:p.to.y},built:p.built})),
    riverPts:riverPts.map(r=>({x:r.x,y:r.y})),
    mountains:mountains.map(m=>({x:m.x,y:m.y,h:m.h,w:m.w,snow:m.snow})),
    lakes:lakes.map(l=>({x:l.x,y:l.y,r:l.r,depth:l.depth})),
    berryBushes:berryBushes.map(b=>({x:b.x,y:b.y,berries:b.berries,maxBerries:b.maxBerries,type:b.type})),
    denseForests:denseForests.map(d=>({x:d.x,y:d.y,r:d.r,trees:d.trees})),
    tradeRoad:tradeRoad.map(t=>({x:t.x,y:t.y})),
    odZones:odZones.map(o=>({x:o.x,y:o.y,size:o.size})),
    flowers:flowers.map(f=>({x:f.x,y:f.y,col:f.col})),
    marketStalls:marketStalls.map(m=>({x:m.x,y:m.y,angle:m.angle,color:m.color})),
    clouds:clouds.map(c=>({x:c.x,y:c.y,s:c.s,sp:c.sp})),
    savedAt:new Date().toISOString()
  };
}

function saveGame(){
  const saves=getSaves();
  const slotName=villageName;
  saves[slotName]=getGameState();
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify(saves));
    msg('Game saved: '+slotName,'good');
  }catch(e){msg('Save failed — storage full!','bad');}
}

function loadGame(slotName){
  const saves=getSaves();const g=saves[slotName];if(!g)return;
  villageName=g.name||slotName;
  R=g.R;for(const k of['fish','berries','meat','vegetables','fruit','eggs','milk','cheese'])if(R[k]===undefined)R[k]=0;S=g.S;tick=g.tick||0;mTimer=g.mTimer||0;
  camX=g.camX||0.5;camY=g.camY||0.5;camZ=g.camZ||1.5;
  riverPts=g.riverPts||[];mountains=g.mountains||[];lakes=g.lakes||[];
  denseForests=g.denseForests||[];tradeRoad=g.tradeRoad||[];
  berryBushes=g.berryBushes||[];
  // Regenerate berries if loading old save without them
  if(berryBushes.length===0&&denseForests.length>0){
    for(const df of denseForests){for(let i=0;i<2+Math.floor(Math.random()*3);i++){
      const a=Math.random()*Math.PI*2,d=df.r*0.5+Math.random()*df.r*0.8;
      const bx=df.x+Math.cos(a)*d,by=df.y+Math.sin(a)*d;
      if(bx>0.05&&bx<0.95&&by>0.05&&by<0.95)berryBushes.push({x:bx,y:by,berries:4+Math.floor(Math.random()*5),maxBerries:8,type:Math.random()<0.4?'mushroom':'berry'});
    }}
  }
  odZones=g.odZones||[];flowers=g.flowers||[];
  marketStalls=g.marketStalls||[];clouds=g.clouds||[];
  huts=g.huts||[];
  trees=(g.trees||[]).map(t=>({...t,chopping:false}));
  rocks=(g.rocks||[]).map(r=>({...r,mining:false}));
  buildings=(g.buildings||[]).map(b=>({...b,workers:[],age:0}));
  villagers=(g.villagers||[]).map(v=>({...v,tx:v.x,ty:v.y,target:null,taskTimer:0,carrying:null,carryAmt:0,walkFrame:0,dir:1,idleTimer:0,home:huts.length?huts[0]:{x:0.5,y:0.5},task:'idle'}));
  animals=(g.animals||[]).map(a=>({...a,tx:a.x,ty:a.y,timer:0,_prey:null,col:({antelope:'#c08040',elephant:'#888',lion:'#c8a040',croc:'#4a6a30',hippo:'#6a5a5a',rabbit:'#a08060',ostrich:'#3a3a3a',chicken:'#c0a060'})[a.type]||'#888'}));
  // Rebuild pipe references
  pipes=(g.pipes||[]).map(p=>({...p,fromB:buildings.find(b=>Math.hypot(b.x-p.from.x,b.y-p.from.y)<0.01&&b.type==='latrine')||null,toB:buildings.find(b=>Math.hypot(b.x-p.to.x,b.y-p.to.y)<0.01&&['treatment','compost','biogas'].includes(b.type))||'river'}));
  traders=[];selected=null;buildMode=null;pipeMode=null;
  S.pop=villagers.length;
  document.getElementById('m-intro').classList.remove('show');
  document.getElementById('m-event').classList.remove('show');
  document.getElementById('village-name').style.display='block';
  document.getElementById('village-name').textContent=villageName;
  updateHUD();updateBuildBar();checkPhase();
  msg('Loaded: '+villageName,'good');
  setSpeed(1);
}

function deleteSave(slotName){
  const saves=getSaves();delete saves[slotName];
  localStorage.setItem(SAVE_KEY,JSON.stringify(saves));
  showLoadMenu();
}

function showLoadMenu(){
  const prev=speed;setSpeed(0);
  const saves=getSaves();const keys=Object.keys(saves);
  let html='<h2>Saved Villages</h2>';
  if(keys.length===0){html+='<p>No saved villages yet.</p>';}
  else{
    for(const k of keys){
      const s=saves[k];
      const info=`Month ${s.S.month} | Pop ${s.S.pop} | ${new Date(s.savedAt).toLocaleDateString()}`;
      html+=`<div class="save-slot" onclick="loadGame('${k.replace(/'/g,"\\'")}')"><div><div class="ss-name">${k}</div><div class="ss-info">${info}</div></div><div class="ss-del" onclick="event.stopPropagation();deleteSave('${k.replace(/'/g,"\\'")}')">&#x1F5D1;</div></div>`;
    }
  }
  html+='<div style="margin-top:12px"><button class="pbtn" onclick="document.getElementById(\'m-event\').classList.remove(\'show\');setSpeed('+prev+')">Close</button></div>';
  document.getElementById('m-event-c').innerHTML=html;
  document.getElementById('m-event').classList.add('show');
}

window.renameVillage=function(){
  const name=prompt('Name your village:',villageName);
  if(name&&name.trim()){villageName=name.trim();document.getElementById('village-name').textContent=villageName;}
};

// ══ START ══
function startGame(diff){
  const name=prompt('Name your village:','Maji Village');
  villageName=(name&&name.trim())?name.trim():'Maji Village';
  const vn=document.getElementById('village-name');vn.textContent=villageName;vn.style.display='block';
  const cfg={easy:[1500,150,120,80,40,20],normal:[1000,100,80,60,15,10],hard:[600,60,50,30,5,0]};
  const[c,w,f,wa,st,cl]=cfg[diff];
  R={coin:c,wood:w,stone:st,clay:cl,food:f,water:wa,fish:0,berries:0,meat:0,vegetables:0,fruit:0,eggs:0,milk:0,cheese:0};
  S={month:1,pop:0,housing:15,san:10,waterQ:35,disease:20,od:40,helm:30,deaths:0,phase:0};
  genWorld();updateHUD();updateBuildBar();checkPhase();
  document.getElementById('m-intro').classList.remove('show');
  msg('Select villagers (click) and assign tasks (right-click).','info');
  msg('Build structures from the bottom bar.','info');
  setSpeed(1);
}

function showIntro(){
  // Check for existing saves
  let savesHtml='';
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(raw){
      const saves=JSON.parse(raw);
      const names=Object.keys(saves);
      if(names.length>0){
        savesHtml='<div style="margin:12px 0;padding:8px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.08)"><p style="font-size:11px;color:#ffd866;margin-bottom:6px;font-weight:700">Saved Villages</p>';
        for(const n of names){
          const s=saves[n];const mo=s.stats?s.stats.month:'?';const pop=s.villagers?s.villagers.length:'?';
          savesHtml+=`<div class="save-slot" onclick="loadGame('${n.replace(/'/g,"\\'")}');document.getElementById('m-intro').classList.remove('show')"><div><span class="ss-name">${n}</span><br><span class="ss-info">Month ${mo} | Pop ${pop}</span></div><span class="ss-del" onclick="event.stopPropagation();deleteSave('${n.replace(/'/g,"\\'")}');showIntro()">&#x2716;</span></div>`;
        }
        savesHtml+='</div>';
      }
    }
  }catch(e){}
  document.getElementById('m-intro-c').innerHTML=`
    <h2>\u{1F30D} Maji Village</h2>
    <p style="text-align:left;font-size:11px;color:#c8b888;line-height:1.6">
      Your village is dying. The river is polluted, disease runs rampant, and open defecation poisons the land.<br><br>
      <b>Command your villagers</b> to gather resources, build infrastructure, and fight for survival.<br><br>
      <span style="color:#ffd866">1.</span> Build a <b>Forestry Hut</b> to chop wood, <b>Hunter Hut</b> to hunt food<br>
      <span style="color:#ffd866">2.</span> Build <b>Latrines</b> for sanitation — assign workers to <b>haul waste</b> to Compost, Biogas, or Treatment<br>
      <span style="color:#ffd866">3.</span> Build a <b>School</b> and send villagers to study — education makes forests regrow and calms wildlife<br>
      <span style="color:#ffd866">4.</span> Farms need <b>Compost</b> to be productive. <b>Biogas</b> generates income. <b>Treatment</b> needs sewer pipes.<br>
      <span style="color:#ffd866">5.</span> Build <b>Granary</b> for food storage, <b>Forestry Hut</b> for wood storage<br><br>
      <span style="color:#888">Scroll to zoom, WASD/Arrows to pan, Right-click to recenter, Shift+drag to pan, Space to pause, 1/2/3 for speed</span>
    </p>
    <p style="font-size:10px;color:#887a60">Resources are limited by storage capacity. More population needs more latrines. Education is key to sustainability.</p>
    ${savesHtml}
    <p style="font-size:11px;color:#aaa;margin-top:8px;font-weight:600">New Game</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:6px">
      <button class="pbtn" style="background:#2e7d32" onclick="startGame('easy')">Easy</button>
      <button class="pbtn" onclick="startGame('normal')">Normal</button>
      <button class="pbtn" style="background:#c62828" onclick="startGame('hard')">Hard</button>
    </div>`;
  document.getElementById('m-intro').classList.add('show');
}

resize();window.addEventListener('resize',resize);
showIntro();setSpeed(0);loop();
</script>
