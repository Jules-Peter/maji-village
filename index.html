<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maji Village</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#1a2a0a;user-select:none}
canvas{display:block}

#res-bar{position:fixed;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px;z-index:10;pointer-events:none}
.res-row{display:flex;justify-content:center;gap:4px}
.rb{display:flex;align-items:center;gap:3px;padding:3px 10px;background:rgba(0,0,0,0.75);border-radius:10px;font-size:12px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,0.08);pointer-events:auto}
.rb .ri{font-size:14px}.rb .rv{color:#ffd866;min-width:24px;text-align:right}

#phase-banner{position:fixed;top:36px;left:50%;transform:translateX(-50%);padding:4px 16px;background:rgba(0,0,0,0.7);border-radius:10px;font-size:11px;font-weight:700;color:#d4a853;border:1px solid #d4a85333;pointer-events:none;z-index:10}

#sel-panel{position:fixed;bottom:52px;left:10px;padding:8px 14px;background:rgba(0,0,0,0.8);border:1px solid #d4a85355;border-radius:10px;font-size:11px;color:#e8dcc8;z-index:10;display:none;min-width:160px;backdrop-filter:blur(6px)}
#sel-panel .sp-name{font-size:13px;font-weight:700;color:#ffd866;margin-bottom:3px}
#sel-panel .sp-info{color:#aaa;line-height:1.6}
#sel-panel .sp-task{color:#8bc34a;font-weight:600}

#build-bar{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(0,0,0,0.82);border-top:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(4px)}
#build-tabs{display:flex;justify-content:center;gap:2px;padding:4px 10px 0}
.bt{padding:3px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:9px;font-weight:700;color:#aaa;transition:all 0.15s}
.bt:hover{color:#ffd866;background:rgba(255,255,255,0.1)}.bt.active{color:#ffd866;background:rgba(212,168,83,0.15);border-color:#d4a85366}
#build-items{display:flex;justify-content:center;gap:4px;padding:4px 10px 6px;flex-wrap:wrap;max-height:70px;overflow-y:auto}
.bb{display:flex;flex-direction:column;align-items:center;padding:4px 8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;transition:all 0.15s;min-width:52px}
.bb:hover{background:rgba(255,255,255,0.14);border-color:#d4a853}
.bb.active{background:rgba(212,168,83,0.2);border-color:#ffd866}
.bb.locked{opacity:0.3;cursor:not-allowed}
.bb .bi{font-size:18px;line-height:1}.bb .bn{font-size:7px;color:#ccc;white-space:nowrap}.bb .bc{font-size:7px;color:#ffd866}
#event-bar{position:fixed;top:56px;right:10px;width:210px;z-index:10;pointer-events:auto;max-height:calc(100vh - 120px);overflow-y:auto}
.hb{padding:6px 8px;margin-bottom:2px;border-radius:6px;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px)}
.hb-title{font-size:10px;font-weight:800;color:#ffd866;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.hb-title .hb-season{font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px}
.hb-row{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.hb-label{font-size:8px;font-weight:700;color:#aaa;width:62px;text-align:right;flex-shrink:0}
.hb-track{flex:1;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;position:relative}
.hb-fill{height:100%;border-radius:4px;transition:width 0.5s}
.hb-val{font-size:8px;font-weight:700;width:28px;text-align:right;flex-shrink:0}
.evt{padding:5px 8px;margin-bottom:3px;border-radius:6px;font-size:9px;font-weight:600;border-left:3px solid;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}
.evt-crit{border-color:#ef5350;color:#ef9a9a}.evt-warn{border-color:#ffa726;color:#ffe0a0}.evt-goal{border-color:#66bb6a;color:#a5d6a7}.evt-info{border-color:#42a5f5;color:#90caf9}
.evt .evt-t{font-weight:800;font-size:10px}.evt .evt-d{font-size:8px;color:#888;margin-top:1px}
#market-btn{position:fixed;bottom:100px;right:10px;z-index:12;padding:8px 20px;background:rgba(180,30,30,0.9);border:2px solid #ef5350;border-radius:10px;color:#ffcdd2;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;backdrop-filter:blur(4px);letter-spacing:0.5px}
#market-btn:hover{background:rgba(220,50,50,0.95);border-color:#ff7070}
#festival-btn{position:fixed;bottom:100px;right:220px;z-index:12;padding:8px 16px;background:rgba(140,80,180,0.9);border:2px solid #ce93d8;border-radius:10px;color:#f3e5f5;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;backdrop-filter:blur(4px);letter-spacing:0.5px}
#festival-btn:hover{background:rgba(170,100,210,0.95);border-color:#e1bee7}
#festival-btn.cooldown{opacity:0.5;cursor:not-allowed}
.market-popup{position:fixed;bottom:140px;right:10px;width:280px;z-index:13;background:rgba(20,10,10,0.95);border:2px solid #ef5350;border-radius:12px;padding:12px;display:none;backdrop-filter:blur(6px);max-height:calc(100vh - 200px);overflow-y:auto}
.market-popup.show{display:block}
.mp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.mp-sell{padding:3px 10px;background:rgba(239,83,80,0.3);border:1px solid #ef5350;border-radius:4px;color:#ffcdd2;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit}
.mp-sell:hover{background:rgba(239,83,80,0.5)}
.mp-sell:disabled,.mp-sell[disabled]{opacity:0.3;cursor:not-allowed}

#msg-log{display:none}

#speed-ctrl{position:fixed;top:6px;right:10px;z-index:10;display:flex;gap:3px}
.sc{padding:3px 8px;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#aaa;font-size:11px;font-weight:700;cursor:pointer}
.sc.active{color:#ffd866;border-color:#d4a853}

.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.popup{background:#1a1a10;border:2px solid #d4a853;border-radius:16px;padding:24px 28px;max-width:480px;width:92%;color:#e8dcc8;text-align:center;max-height:90vh;overflow-y:auto}
.popup h2{color:#ffd866;margin-bottom:10px;font-size:20px}
.popup p{font-size:12px;color:#a09070;margin-bottom:8px;line-height:1.5}
.pbtn{padding:8px 22px;background:#d4a853;border:none;border-radius:8px;color:#1a1a10;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;margin:4px}
.pbtn:hover{background:#e8b863}

.char-box{display:flex;align-items:flex-start;gap:12px;text-align:left;margin:12px 0;padding:10px;background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
.char-face{font-size:32px;line-height:1}.char-nm{font-weight:700;color:#ffd866;font-size:13px}
.char-role{font-size:10px;color:#887a60;margin-bottom:3px}.char-msg{font-size:12px;color:#d4c8a8;line-height:1.5;font-style:italic}
.choice{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;margin:5px 0;cursor:pointer;transition:background 0.2s;text-align:left}
.choice:hover{background:rgba(255,255,255,0.12)}.cn{font-weight:700;color:#ffd866;font-size:12px}.cp{font-size:11px;color:#888}.cd{font-size:10px;color:#aaa;margin-top:2px}

#tooltip{position:fixed;padding:4px 10px;background:rgba(0,0,0,0.85);border:1px solid #d4a85355;border-radius:6px;font-size:10px;color:#e8dcc8;z-index:20;pointer-events:none;display:none;white-space:nowrap}
#village-name{position:fixed;top:6px;left:10px;z-index:10;font-size:13px;font-weight:800;color:#ffd866;cursor:pointer;background:rgba(0,0,0,0.6);padding:2px 10px;border-radius:8px;border:1px solid rgba(212,168,83,0.3)}
#village-name:hover{border-color:#ffd866}
#save-ctrl{position:fixed;top:6px;right:120px;z-index:10;display:flex;gap:3px}
.save-slot{padding:6px 8px;margin:4px 0;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;transition:background 0.2s;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:8px}
.save-slot:hover{background:rgba(255,255,255,0.12)}
.save-slot .ss-name{font-weight:700;color:#ffd866;font-size:12px}
.save-slot .ss-info{font-size:9px;color:#888}
.save-slot .ss-del{color:#ef5350;font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px}
.save-slot .ss-del:hover{background:rgba(239,83,80,0.2)}
</style>
</head>

<div id="msg-log"></div>

</div>
<div id="village-name" onclick="renameVillage()" style="display:none"></div>
<div id="save-ctrl">

<div id="build-bar"><div id="build-tabs"></div><div id="build-items"></div></div>
<div id="event-bar"></div>
<button id="market-btn" onclick="toggleMarket()">&#x1F4B0; Exploiting World Market</button>
<button id="festival-btn" onclick="startFestival()">&#x1F389; Festival (100&#x1FA99;)</button>
<div class="market-popup" id="market-popup" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()"></div>
<div id="tooltip"></div>

<div class="overlay show" id="m-intro"><div class="popup" id="m-intro-c"></div></div>
<div class="overlay" id="m-event"><div class="popup" id="m-event-c"></div></div>

// ══ COORDINATE TRANSFORMS ══
function ts(o){const sx=(o.x-camX)*camZ+0.5;const sy=(o.y-camY)*camZ+0.5;return{x:sx*W,y:sy*H};}
function scl(v){return v*camZ*W;}
function fromScreen(sx,sy){return{x:(sx/W-0.5)/camZ+camX,y:(sy/H-0.5)/camZ+camY};}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function nearRiver(px,py,t){for(const r of riverPts)if(Math.hypot(px-r.x,py-r.y)<t)return true;return false;}
function countBuilt(type){return buildings.filter(b=>b.type===type&&b.built>=1).length;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// ══ STORAGE & WASTE ══
function getStorageCap(res){
  let base={wood:30,food:30,water:30,stone:50,clay:50,fish:15,berries:20,meat:20,vegetables:20,fruit:20,eggs:15,milk:20,cheese:15}[res]||50;
  for(const b of buildings){if(b.built<1)continue;const lv=b.level||1;
    if(res==='wood'&&b.type==='forestryhut')base+=(BD.forestryhut.storWood||60)*lv;
    if(res==='food'&&b.type==='granary')base+=(BD.granary.storFood||80)*lv;
    if(res==='water'&&b.type==='well')base+=(BD.well.storWater||40)*lv;
    if(res==='water'&&b.type==='reservoir')base+=(BD.reservoir.storWater||100)*lv;
    if(res==='fish'&&b.type==='fishinghut')base+=(BD.fishinghut.storFish||40)*lv;
    if(res==='berries'&&b.type==='gathererhut')base+=(BD.gathererhut.storBerries||40)*lv;
    if(res==='milk'&&b.type==='dairyfarm')base+=30*lv;
    if(res==='cheese'&&b.type==='cheesemaker')base+=20*lv;
    if(res==='clay'&&b.type==='claypit')base+=(BD.claypit.storClay||40)*lv;
    if(res==='stone'&&b.type==='quarry')base+=(BD.quarry.storStone||50)*lv;
  }
  return base;
}
function clampResources(){for(const k of['wood','food','water','stone','clay','fish','berries','meat','vegetables','fruit','eggs','milk','cheese'])R[k]=Math.min(R[k],getStorageCap(k));}
function getTotalLatrineWaste(){return buildings.filter(b=>b.type==='latrine'&&b.built>=1).reduce((s,b)=>s+(b.waste||0),0);}
function getTotalLatrineCap(){return buildings.filter(b=>b.type==='latrine'&&b.built>=1).reduce((s,b)=>s+(BD.latrine.latrineWasteCap||20)*(b.level||1),0);}
function getEduLevel(){return villagers.length>0?villagers.reduce((s,v)=>s+(v.edu||0),0)/villagers.length:0;}
function hasBuilt(type){return buildings.some(b=>b.type===type&&b.built>=1);}
function getTradeScore(){
  let score=0;
  score+=countBuilt('tradingpost')*15;score+=countBuilt('market')*8;score+=countBuilt('inn')*10;
  score+=countBuilt('road')*3;score+=Math.min(20,S.pop);
  if(S.san>40)score+=10;if(S.disease<30)score+=10;
  return score;
}
function nearMountain(px,py,t){for(const m of mountains)if(Math.hypot(px-m.x,py-m.y)<t)return true;return false;}
function nearLake(px,py,t){for(const l of lakes)if(Math.hypot(px-l.x,py-l.y)<l.r+t)return true;return false;}

// ══ WORLD GENERATION ══
function genWorld(){
  riverPts=[];
  // River — longer, winding across the wider map
  for(let i=0;i<=100;i++){const rx=0.1+i*0.008;const ry=0.62+Math.sin(rx*8)*0.05+Math.sin(rx*16)*0.02+Math.cos(rx*5)*0.03;riverPts.push({x:rx,y:ry});}

  // ─ FISH SPOTS along the river ─
  fishPts=[];
  for(let i=0;i<6;i++){const rp=riverPts[Math.floor(10+i*15)];if(rp)fishPts.push({x:rp.x+(Math.random()-0.5)*0.015,y:rp.y+(Math.random()-0.5)*0.01,fish:8+Math.floor(Math.random()*6),timer:0});}

  // ─ MOUNTAINS — rocky highlands at map edges ─
  mountains=[];
  const mtPositions=[[0.12,0.2],[0.18,0.15],[0.15,0.25],[0.82,0.22],[0.88,0.18],[0.85,0.28],[0.75,0.15],[0.2,0.82],[0.15,0.78],[0.8,0.8],[0.85,0.75]];
  for(const[mx,my]of mtPositions){mountains.push({x:mx+(Math.random()-0.5)*0.04,y:my+(Math.random()-0.5)*0.04,h:0.03+Math.random()*0.03,w:0.02+Math.random()*0.02,snow:Math.random()<0.3});}

  // ─ LAKES — small water bodies ─
  lakes=[];
  lakes.push({x:0.22,y:0.45+Math.random()*0.06,r:0.025+Math.random()*0.015,depth:0.6+Math.random()*0.3});
  lakes.push({x:0.78,y:0.38+Math.random()*0.06,r:0.02+Math.random()*0.01,depth:0.5+Math.random()*0.3});
  if(Math.random()<0.5)lakes.push({x:0.35,y:0.25+Math.random()*0.04,r:0.015+Math.random()*0.01,depth:0.7});

  // ─ DENSE FORESTS — thick tree clusters far from village ─
  denseForests=[];
  const dfPositions=[[0.15,0.4],[0.85,0.4],[0.3,0.15],[0.7,0.85],[0.2,0.65],[0.8,0.55]];
  for(const[fx,fy]of dfPositions){
    if(!nearRiver(fx,fy,0.04)){
      denseForests.push({x:fx+(Math.random()-0.5)*0.03,y:fy+(Math.random()-0.5)*0.03,r:0.03+Math.random()*0.02,trees:8+Math.floor(Math.random()*6)});
    }
  }

  // ─ TRADE ROAD — path from map edge to village center ─
  tradeRoad=[];
  for(let i=0;i<=30;i++){const t=i/30;
    tradeRoad.push({x:0.05+t*0.45,y:0.15+t*0.35+Math.sin(t*5)*0.02});
  }

  marketStalls=[];
  for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2-Math.PI/6;marketStalls.push({x:0.5+Math.cos(a)*0.016,y:0.5+Math.sin(a)*0.016,angle:a,color:['#c04020','#2060a0','#d4a020','#208040','#c06020'][i]});}

  // Trees — scattered across wider map
  trees=[];
  for(let i=0;i<120;i++){
    const a=Math.random()*Math.PI*2,d=0.05+Math.random()*0.3;
    const tx=0.5+Math.cos(a)*d,ty=0.5+Math.sin(a)*d;
    if(tx<0.05||tx>0.95||ty<0.05||ty>0.95)continue;
    if(!nearRiver(tx,ty,0.025)&&Math.hypot(tx-0.5,ty-0.5)>0.035&&!nearMountain(tx,ty,0.03)){
      trees.push({x:tx,y:ty,s:6+Math.random()*8,sw:Math.random()*6,type:Math.random()<0.15?'palm':'round',wood:8+Math.floor(Math.random()*7),maxWood:15,chopping:false});
    }
  }
  // Extra trees inside dense forest zones
  for(const df of denseForests){
    for(let i=0;i<df.trees;i++){
      const a=Math.random()*Math.PI*2,d=Math.random()*df.r;
      const tx=df.x+Math.cos(a)*d,ty=df.y+Math.sin(a)*d;
      if(!nearRiver(tx,ty,0.02)){
        trees.push({x:tx,y:ty,s:8+Math.random()*10,sw:Math.random()*6,type:'round',wood:12+Math.floor(Math.random()*8),maxWood:20,chopping:false,dense:true});
      }
    }
  }

  // Berry bushes — spawn near dense forests and scattered trees
  berryBushes=[];
  for(const df of denseForests){
    const nBushes=2+Math.floor(Math.random()*3);
    for(let i=0;i<nBushes;i++){
      const a=Math.random()*Math.PI*2,d=df.r*0.5+Math.random()*df.r*0.8;
      const bx=df.x+Math.cos(a)*d,by=df.y+Math.sin(a)*d;
      if(bx>0.05&&bx<0.95&&by>0.05&&by<0.95&&!nearRiver(bx,by,0.02)){
        berryBushes.push({x:bx,y:by,berries:4+Math.floor(Math.random()*5),maxBerries:8,type:Math.random()<0.4?'mushroom':'berry'});
      }
    }
  }
  // A few scattered bushes near other trees
  for(let i=0;i<8;i++){
    const t=trees[Math.floor(Math.random()*trees.length)];
    if(!t)continue;
    const bx=t.x+(Math.random()-0.5)*0.02,by=t.y+(Math.random()-0.5)*0.02;
    if(bx>0.05&&bx<0.95&&by>0.05&&by<0.95&&!nearRiver(bx,by,0.02)){
      berryBushes.push({x:bx,y:by,berries:3+Math.floor(Math.random()*4),maxBerries:7,type:Math.random()<0.3?'mushroom':'berry'});
    }
  }

  // Rocks — stone resource nodes, some near mountains
  rocks=[];
  for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,d=0.06+Math.random()*0.25;
    const rx=0.5+Math.cos(a)*d,ry=0.5+Math.sin(a)*d;
    if(rx>0.05&&rx<0.95&&ry>0.05&&ry<0.95&&!nearRiver(rx,ry,0.025))
      rocks.push({x:rx,y:ry,s:3+Math.random()*4,stone:6+Math.floor(Math.random()*6),mining:false});
  }
  // Extra stone near mountains
  for(const m of mountains){if(Math.random()<0.6){
    rocks.push({x:m.x+(Math.random()-0.5)*0.03,y:m.y+m.h*0.5+(Math.random()-0.5)*0.02,s:4+Math.random()*3,stone:10+Math.floor(Math.random()*8),mining:false});
  }}
  // Clay pits — near river banks and lakes
  for(let i=0;i<12;i++){
    const rp=riverPts[5+Math.floor(Math.random()*(riverPts.length-10))];
    const off=(Math.random()<0.5?1:-1)*(0.02+Math.random()*0.015);
    rocks.push({x:rp.x+(Math.random()-0.5)*0.03,y:rp.y+off,s:3+Math.random()*2,clay:10+Math.floor(Math.random()*6),isClay:true,mining:false});
  }
  // Extra clay near lakes
  for(const l of lakes){for(let i=0;i<2;i++){
    const a=Math.random()*Math.PI*2;
    rocks.push({x:l.x+Math.cos(a)*(l.r+0.015),y:l.y+Math.sin(a)*(l.r+0.015),s:3+Math.random()*2,clay:8+Math.floor(Math.random()*5),isClay:true,mining:false});
  }}

  clouds=[];
  for(let i=0;i<8;i++)clouds.push({x:Math.random(),y:0.2+Math.random()*0.15,s:0.025+Math.random()*0.04,sp:0.00002+Math.random()*0.00004});

  odZones=[];
  for(let i=0;i<3;i++){const a=Math.random()*Math.PI*2,d=0.04+Math.random()*0.04;odZones.push({x:0.5+Math.cos(a)*d,y:0.5+Math.sin(a)*d,size:0.012+Math.random()*0.006});}

  huts=[];buildings=[];flowers=[];paths=[];fishPts=[];traders=[];
  // Start with 3 huts around center
  for(let i=0;i<3;i++){
    const a=(i/3)*Math.PI*2+0.3;const d=0.05;
    huts.push({x:0.5+Math.cos(a)*d,y:0.5+Math.sin(a)*d,level:0,size:10,shape:'round'});
  }
  S.housing=15;

  // Starting villagers
  villagers=[];
  for(let i=0;i<12;i++)spawnVillager();

  // Animals
  animals=[];
  spawnAnimals();

  // Auto-assign starting tasks so village is alive immediately
  autoAssignStarters();
}

function updateAnimals(){
  for(const a of animals){
    a.timer+=speed;
    if(a.type==='antelope'){
      // Flee from villagers
      let flee=false;
      for(const v of villagers){if(dist(v,a)<a.fleeRadius){
        const dx=a.x-v.x,dy=a.y-v.y,d=Math.hypot(dx,dy)||0.001;
        a.x+=dx/d*a.speed*speed*2;a.y+=dy/d*a.speed*speed*2;flee=true;break;
      }}
      if(!flee){
        if(a.timer>200+Math.random()*200){a.timer=0;a.tx=a.x+(Math.random()-0.5)*0.08;a.ty=a.y+(Math.random()-0.5)*0.06;}
        const d=dist(a,{x:a.tx,y:a.ty});
        if(d>0.003){a.x+=(a.tx-a.x)/d*a.speed*speed;a.y+=(a.ty-a.y)/d*a.speed*speed;}
      }
    }
    else if(a.type==='rabbit'||a.type==='ostrich'||a.type==='chicken'){
      // Same flee/wander logic as antelope
      let flee=false;
      for(const v of villagers){if(dist(v,a)<a.fleeRadius){
        const dx=a.x-v.x,dy=a.y-v.y,d=Math.hypot(dx,dy)||0.001;
        a.x+=dx/d*a.speed*speed*2;a.y+=dy/d*a.speed*speed*2;flee=true;break;
      }}
      if(!flee){
        const wt=a.type==='chicken'?100:150;
        if(a.timer>wt+Math.random()*wt){a.timer=0;const r=a.type==='chicken'?0.03:0.06;a.tx=a.x+(Math.random()-0.5)*r;a.ty=a.y+(Math.random()-0.5)*r;}
        const d=dist(a,{x:a.tx,y:a.ty});
        if(d>0.002){a.x+=(a.tx-a.x)/d*a.speed*speed;a.y+=(a.ty-a.y)/d*a.speed*speed;}
      }
    }
    else if(a.type==='elephant'){
      if(a.timer>400+Math.random()*300){a.timer=0;a.tx=a.x+(Math.random()-0.5)*0.1;a.ty=a.y+(Math.random()-0.5)*0.08;}
      const d=dist(a,{x:a.tx,y:a.ty});
      if(d>0.003){a.x+=(a.tx-a.x)/d*a.speed*speed;a.y+=(a.ty-a.y)/d*a.speed*speed;}
      // Trample nearby buildings if too close to village
      if(Math.hypot(a.x-0.5,a.y-0.5)<0.08){
        for(const b of buildings){if(dist(a,b)<0.018&&b.built>=1&&Math.random()<0.004*speed){
          const dmgAmt=b.type==='farm'?15:8;
          b.hp-=dmgAmt;if(b.hp<=0){msg(BD[b.type].nm+' destroyed by elephant!','bad');buildings=buildings.filter(x=>x!==b);}
          else if(Math.random()<0.3)msg(BD[b.type].nm+' damaged by elephant! ('+Math.round(b.hp)+'% HP)','warn');
        }}
        // Elephants can also knock down villagers
        for(const v of villagers){if(v.hp>0&&dist(a,v)<0.01&&Math.random()<0.003*speed){
          v.hp-=15;if(v.hp<=0)msg('A villager was trampled by an elephant!','bad');
          else msg('Villager injured by elephant!','warn');
        }}
      }
    }
    else if(a.type==='lion'){
      // Check for watchtowers — lions avoid them
      const nearTower=buildings.some(b=>b.type==='watchtower'&&b.built>=1&&dist(a,b)<0.08*(b.level||1));
      if(nearTower){
        // Flee from watchtower
        const tw=buildings.find(b=>b.type==='watchtower'&&b.built>=1&&dist(a,b)<0.08*(b.level||1));
        if(tw){const dx=a.x-tw.x,dy=a.y-tw.y,d=Math.hypot(dx,dy)||0.001;a.x+=dx/d*a.speed*speed*1.5;a.y+=dy/d*a.speed*speed*1.5;}
        a.state='flee';
      }
      else if(a.state==='prowl'){
        // Hunt nearest villager at edge of village
        let target=null,nd=Infinity;
        for(const v of villagers){const d=dist(a,v);if(d<a.huntRadius&&d<nd){nd=d;target=v;}}
        if(target){
          a.state='hunt';a.tx=target.x;a.ty=target.y;a._prey=target;
        }else{
          if(a.timer>300){a.timer=0;a.tx=a.x+(Math.random()-0.5)*0.1;a.ty=a.y+(Math.random()-0.5)*0.08;}
          const d=dist(a,{x:a.tx,y:a.ty});if(d>0.003){a.x+=(a.tx-a.x)/d*a.speed*speed*0.5;a.y+=(a.ty-a.y)/d*a.speed*speed*0.5;}
        }
      }
      else if(a.state==='hunt'&&a._prey){
        const prey=a._prey;
        if(prey.hp<=0){a._kills=(a._kills||0)+1;a.state='prowl';a._prey=null;continue;}
        // Lion kill cap: max 10% of village per attack cycle
        const maxKills=Math.max(1,Math.ceil(villagers.length*0.1));
        if((a._kills||0)>=maxKills){a.state='flee';a._prey=null;a.tx=a.x+(a.x>0.5?0.15:-0.15);a.ty=a.y+(a.y>0.5?0.1:-0.1);a.timer=0;continue;}
        a.tx=prey.x;a.ty=prey.y;
        const d=dist(a,prey);
        if(d<0.005){
          prey.hp-=a.dmg*0.1*speed;
          if(prey.hp<=0){msg('A villager was killed by a lion!','bad');a._kills=(a._kills||0)+1;}
          if(Math.random()<0.015*speed){a.state='prowl';a._prey=null;}
        }else{
          a.x+=(a.tx-a.x)/d*a.speed*speed*1.5;a.y+=(a.ty-a.y)/d*a.speed*speed*1.5;
        }
      }
      else if(a.state==='flee'){
        // Lion retreating after kill spree
        const d=dist(a,{x:a.tx,y:a.ty});
        if(d>0.003){a.x+=(a.tx-a.x)/d*a.speed*speed*2;a.y+=(a.ty-a.y)/d*a.speed*speed*2;}
        else{a.state='prowl';a._kills=0;} // reset kills when far away
      }
      else{a.state='prowl';a._kills=0;} // reset
    }
    else if(a.type==='croc'){
      // Crocodile: spawns far from village, patrols full river length
      if(a.state==='lurk'){
        // Patrol along river — pick a point anywhere along the river
        if(a.timer>150+Math.random()*200){
          a.timer=0;
          const curIdx=a._riverIdx||0;
          // Usually drift 5-30 points along river, occasionally do a long patrol
          const longPatrol=Math.random()<0.15;
          const offset=longPatrol?Math.floor((Math.random()-0.5)*80):Math.floor((Math.random()-0.5)*30);
          const newIdx=clamp(curIdx+offset,0,riverPts.length-1);
          a._riverIdx=newIdx;
          const target=riverPts[newIdx];
          a.tx=target.x+(Math.random()-0.5)*0.008;a.ty=target.y+(Math.random()-0.5)*0.004;
          a._homeX=target.x;a._homeY=target.y;
        }
        const d=dist(a,{x:a.tx,y:a.ty});
        if(d>0.002){a.x+=(a.tx-a.x)/d*a.speed*speed;a.y+=(a.ty-a.y)/d*a.speed*speed;}
        // Check for nearby villagers — ambush!
        for(const v of villagers){
          if(v.hp>0&&dist(a,v)<a.huntRadius){
            a.state='attack';a._prey=v;break;
          }
        }
      }else if(a.state==='attack'&&a._prey){
        const prey=a._prey;
        if(prey.hp<=0||dist(a,prey)>0.06){a.state='lurk';a._prey=null;a.tx=a._homeX;a.ty=a._homeY;continue;}
        a.tx=prey.x;a.ty=prey.y;
        const d=dist(a,prey);
        if(d<0.005){
          prey.hp-=a.dmg*0.15*speed;
          if(prey.hp<=0){
            msg('A villager was killed by a crocodile!','bad');
            for(let b=0;b<8;b++)bloodParticles.push({x:prey.x+(Math.random()-0.5)*0.005,y:prey.y+(Math.random()-0.5)*0.003,age:0,maxAge:400+Math.random()*300,sz:1+Math.random()*2});
            a.state='lurk';a._prey=null;a.tx=a._homeX;a.ty=a._homeY;
          }
        }else{
          a.x+=(a.tx-a.x)/d*a.speed*speed*4;a.y+=(a.ty-a.y)/d*a.speed*speed*4;
        }
      }else{a.state='lurk';}
    }
    else if(a.type==='hippo'){
      // Hippo: spawns far from village, roams full river length
      if(a.state==='wallow'){
        // Patrol along river — hippos roam long stretches
        if(a.timer>250+Math.random()*300){
          a.timer=0;
          const curIdx=a._riverIdx||0;
          // Usually drift 5-25 points, occasionally long patrol
          const longPatrol=Math.random()<0.12;
          const offset=longPatrol?Math.floor((Math.random()-0.5)*70):Math.floor((Math.random()-0.5)*25);
          const newIdx=clamp(curIdx+offset,0,riverPts.length-1);
          a._riverIdx=newIdx;
          const target=riverPts[newIdx];
          a.tx=target.x+(Math.random()-0.5)*0.01;a.ty=target.y+(Math.random()-0.5)*0.006;
          a._homeX=target.x;a._homeY=target.y;
        }
        const d=dist(a,{x:a.tx,y:a.ty});
        if(d>0.002){a.x+=(a.tx-a.x)/d*a.speed*speed;a.y+=(a.ty-a.y)/d*a.speed*speed;}
        // Charge nearby villagers — hippos are extremely aggressive
        for(const v of villagers){
          if(v.hp>0&&dist(a,v)<a.huntRadius){
            a.state='charge';a._prey=v;break;
          }
        }
      }else if(a.state==='charge'&&a._prey){
        const prey=a._prey;
        if(prey.hp<=0||dist(a,prey)>0.08){a.state='wallow';a._prey=null;a.tx=a._homeX;a.ty=a._homeY;continue;}
        a.tx=prey.x;a.ty=prey.y;
        const d=dist(a,prey);
        if(d<0.006){
          prey.hp-=a.dmg*0.12*speed;
          if(prey.hp<=0){
            msg('A villager was killed by a hippo!','bad');
            for(let b=0;b<10;b++)bloodParticles.push({x:prey.x+(Math.random()-0.5)*0.006,y:prey.y+(Math.random()-0.5)*0.004,age:0,maxAge:500+Math.random()*300,sz:1.5+Math.random()*2.5});
            a.state='wallow';a._prey=null;a.tx=a._homeX;a.ty=a._homeY;
          }
        }else{
          a.x+=(a.tx-a.x)/d*a.speed*speed*5;a.y+=(a.ty-a.y)/d*a.speed*speed*5;
        }
      }else{a.state='wallow';}
    }
    // Keep animals on map
    a.x=clamp(a.x,0.08,0.92);a.y=clamp(a.y,0.08,0.92);
  }

  // Update blood particles — flow downstream along river
  for(let i=bloodParticles.length-1;i>=0;i--){
    const bp=bloodParticles[i];
    bp.age+=speed;
    if(bp.age>bp.maxAge){bloodParticles.splice(i,1);continue;}
    // Find nearest river point and drift downstream (increasing x = downstream)
    bp.x+=0.00008*speed;
    // Drift toward river center
    const nearR=riverPts.reduce((best,r)=>Math.abs(r.x-bp.x)<Math.abs(best.x-bp.x)?r:best);
    bp.y+=(nearR.y-bp.y)*0.02*speed;
    // Add slight wobble
    bp.y+=Math.sin(tick*0.1+bp.x*200)*0.00003*speed;
  }

  // Respawn animals occasionally
  if(tick%2000<speed&&animals.filter(a=>a.type==='antelope').length<3){
    const a=Math.random()*Math.PI*2,d=0.2;
    animals.push({type:'antelope',x:0.5+Math.cos(a)*d,y:0.5+Math.sin(a)*d,tx:0,ty:0,speed:0.00045,hp:30,state:'wander',timer:0,sz:0.008,col:'#c08040',fleeRadius:0.05});
  }
  if(tick%1500<speed&&animals.filter(a=>a.type==='rabbit').length<3){
    const a=Math.random()*Math.PI*2,d=0.1+Math.random()*0.15;
    animals.push({type:'rabbit',x:0.5+Math.cos(a)*d,y:0.5+Math.sin(a)*d,tx:0,ty:0,speed:0.0005,hp:10,state:'wander',timer:0,sz:0.005,col:'#a08060',fleeRadius:0.04});
  }
  if(tick%2500<speed&&animals.filter(a=>a.type==='ostrich').length<2){
    const a=Math.random()*Math.PI*2,d=0.15+Math.random()*0.2;
    animals.push({type:'ostrich',x:0.5+Math.cos(a)*d,y:0.5+Math.sin(a)*d,tx:0,ty:0,speed:0.00055,hp:20,state:'wander',timer:0,sz:0.01,col:'#3a3a3a',fleeRadius:0.06});
  }
  if(tick%1800<speed&&animals.filter(a=>a.type==='chicken').length<3){
    const a=Math.random()*Math.PI*2,d=0.05+Math.random()*0.1;
    animals.push({type:'chicken',x:0.5+Math.cos(a)*d,y:0.5+Math.sin(a)*d,tx:0,ty:0,speed:0.0002,hp:8,state:'wander',timer:0,sz:0.004,col:'#c0a060',fleeRadius:0.025});
  }
  if(tick%5000<speed&&animals.filter(a=>a.type==='lion').length<1){
    const a=Math.random()*Math.PI*2,d=0.22;
    animals.push({type:'lion',x:0.5+Math.cos(a)*d,y:0.5+Math.sin(a)*d,tx:0,ty:0,speed:0.0008,hp:80,state:'prowl',timer:0,sz:0.01,col:'#c8a040',fleeRadius:0,dmg:30,huntRadius:0.08});
    msg('A lion has been spotted near the village!','bad');
  }
  // Respawn croc (max 1) — far from village
  if(tick%8000<speed&&animals.filter(a=>a.type==='croc').length<1&&riverPts.length>0){
    const idx=Math.random()<0.5?Math.floor(Math.random()*15):Math.floor(85+Math.random()*16);
    const rp=riverPts[clamp(idx,0,riverPts.length-1)];
    if(rp)animals.push({type:'croc',x:rp.x,y:rp.y,tx:rp.x,ty:rp.y,speed:0.0003,hp:60,state:'lurk',timer:0,sz:0.01,col:'#4a6a30',fleeRadius:0,dmg:40,huntRadius:0.03,_homeX:rp.x,_homeY:rp.y,_riverIdx:idx});
  }
  // Respawn hippo (max 1) — far from village
  if(tick%10000<speed&&animals.filter(a=>a.type==='hippo').length<1&&riverPts.length>0){
    const idx=Math.random()<0.5?Math.floor(Math.random()*12):Math.floor(88+Math.random()*13);
    const rp=riverPts[clamp(idx,0,riverPts.length-1)];
    if(rp){animals.push({type:'hippo',x:rp.x,y:rp.y,tx:rp.x,ty:rp.y,speed:0.0004,hp:150,state:'wallow',timer:0,sz:0.014,col:'#6a5a5a',fleeRadius:0,dmg:25,huntRadius:0.02,_homeX:rp.x,_homeY:rp.y,_riverIdx:idx});
    msg('A hippo has settled in the river!','warn');}
  }
}

// ══ TRADER AI ══
function updateTraders(){
  for(let i=traders.length-1;i>=0;i--){
    const tr=traders[i];tr.timer+=speed;
    const d=dist(tr,{x:tr.tx,y:tr.ty});
    if(d>0.005){
      tr.x+=(tr.tx-tr.x)/d*tr.speed*speed;tr.y+=(tr.ty-tr.y)/d*tr.speed*speed;
      tr.dir=tr.tx>tr.x?1:-1;
    }else{
      if(tr.state==='arriving'){
        // Arrived at village — trade!
        tr.state='trading';tr.timer=0;
      }else if(tr.state==='trading'){
        if(tr.timer>120){
          // Complete trade
          const tradeScore=getTradeScore();
          const income=Math.floor((10+tradeScore*0.8+Math.random()*30)*(tr.bonus||1));
          R.coin+=income;
          // Traders buy surplus resources
          let extra='';
          if(R.wood>getStorageCap('wood')*0.7&&R.wood>20){const sell=Math.min(10,R.wood-15);R.wood-=sell;R.coin+=sell*3;extra+=` +${sell*3} (wood)`;}
          if(R.food>getStorageCap('food')*0.7&&R.food>20){const sell=Math.min(8,R.food-15);R.food-=sell;R.coin+=sell*5;extra+=` +${sell*5} (food)`;}
          if(R.stone>30){const sell=Math.min(5,R.stone-20);R.stone-=sell;R.coin+=sell*6;extra+=` +${sell*6} (stone)`;}
          if(R.fish>getStorageCap('fish')*0.5&&R.fish>5){const sell=Math.min(6,R.fish-3);R.fish-=sell;R.coin+=sell*7;extra+=` +${sell*7} (fish)`;}
          const kn=(tr.kind||'trader');msg(kn.charAt(0).toUpperCase()+kn.slice(1)+': +'+income+' coins'+extra,'good');
          // Leave
          tr.state='leaving';tr.tx=tradeRoad[0].x;tr.ty=tradeRoad[0].y;tr.timer=0;
        }
      }else if(tr.state==='leaving'){
        if(tr.timer>300||tr.x<0.08){traders.splice(i,1);continue;}
      }
    }
  }
}
function spawnTrader(){
  if(tradeRoad.length<2)return;
  const start=tradeRoad[0];
  const end=tradeRoad[tradeRoad.length-1];
  const types=['backpacker','cart','caravan'];
  const tradeScore=getTradeScore();
  // Better trade score = better traders
  let kind=types[0];
  const r=Math.random();
  if(tradeScore>50&&r<0.3)kind='caravan';
  else if(tradeScore>25&&r<0.5)kind='cart';
  else if(r<0.15)kind='cart';
  const speeds={backpacker:0.00035,cart:0.00025,caravan:0.0002};
  const bonuses={backpacker:1,cart:1.8,caravan:3};
  traders.push({x:start.x,y:start.y,tx:end.x,ty:end.y,speed:speeds[kind],timer:0,state:'arriving',dir:1,kind:kind,bonus:bonuses[kind]});
}

function autoAssignStarters(){
  // Only auto-assign water fetchers at start — forestry hut needed for chopping
  let wa=0;
  for(const v of villagers){
    if(wa>=3)break;
    if(v.isChild)continue;
    const rp=riverPts.reduce((a,b)=>dist(b,v)<dist(a,v)?b:a);
    v.task='fetchwater';v.target=rp;v.tx=rp.x;v.ty=rp.y;v._prevTask='fetchwater';v._prevTarget=rp;wa++;
  }
}

function spawnVillager(){
  const h=huts.length?huts[(Math.random()*huts.length)|0]:{x:0.5,y:0.5};
  const skins=['#8d5524','#c68642','#e0ac69','#6b4423','#a0724a'];
  const clothes=[['#c04020','#e8d0a0'],['#2060a0','#d0c090'],['#d4a020','#f0e8d0'],['#208040','#c8b888'],['#8040a0','#e0d0c0']];
  const cl=clothes[(Math.random()*clothes.length)|0];
  const isChild=Math.random()<0.2;
  villagers.push({
    x:h.x+(Math.random()-0.5)*0.01,y:h.y+(Math.random()-0.5)*0.008,
    tx:h.x,ty:h.y,
    skin:skins[(Math.random()*skins.length)|0],
    shirt:cl[0],wrap:cl[1],
    sz:isChild?0.004:0.006,isChild,
    hp:100,hunger:80+Math.random()*20,thirst:80+Math.random()*20,
    task:'idle',target:null,taskTimer:0,carrying:null,carryAmt:0,
    speed:0.0004+Math.random()*0.0002,
    walkFrame:0,dir:1,idleTimer:0,sick:false,
    edu:0, // education 0-100
    prof:null,dietDiv:0,
    home:h
  });
}

// ══ INPUT ══
// Unified click handler: click villager to select, click target to assign task
cv.addEventListener('contextmenu',e=>e.preventDefault());

cv.addEventListener('mousedown',e=>{
  if(e.button===2||e.button===1)return;
  const w=fromScreen(e.clientX,e.clientY);

  // Build mode: place a building
  if(buildMode){tryBuild(buildMode,w.x,w.y);return;}

  // If a villager is selected, try to assign a task first
  if(selected&&selected.skin){
    const v=selected;

    // Clicking another villager? Switch selection
    for(const v2 of villagers){
      if(v2!==v&&dist(v2,w)<0.012){selected=v2;msg('Selected villager','info');updateSelPanel();return;}
    }

    // Tree → chop wood (anyone can chop, but without forestry hut trees won't regrow)
    for(const t of trees){
      if(dist(t,w)<0.015&&t.wood>0){
        if(!hasBuilt('forestryhut'))msg('\u26A0 No Forestry Hut — trees won\'t regrow!','warn');
        assignTask(v,'chop',t,t.x,t.y);msg('\u2192 Chop wood','info');return;
      }
    }
    // Berry bush / mushroom → gather (dangerous — lions!)
    for(const bb of berryBushes){
      if(dist(bb,w)<0.012&&bb.berries>0){
        assignTask(v,'gather',bb,bb.x,bb.y);msg('\u2192 Gather '+(bb.type==='mushroom'?'mushrooms':'berries')+' (watch out for lions!)','info');return;
      }
    }
    // Animals → hunt or wildlife control
    for(const an of animals){
      if(dist(an,w)<0.015){
        if(['antelope','rabbit','ostrich','chicken'].includes(an.type)){
          if(['antelope','ostrich'].includes(an.type)&&!hasBuilt('hunterhut')){msg('Build a Hunter Hut first!','bad');return;}
          assignTask(v,'hunt',an,an.x,an.y);msg('\u2192 Hunt '+an.type,'info');return;
        }
        if(['lion','croc','hippo'].includes(an.type)){
          if(!hasBuilt('watchtower')){msg('Build a Watchtower first to train rangers!','bad');return;}
          assignTask(v,'wildlifecontrol',an,an.x,an.y);msg('\u2192 Wildlife control: '+an.type+' (VERY DANGEROUS! 2% survival!)','bad');return;
        }
      }
    }
    // Rock → mine stone / clay
    for(const r of rocks){
      if(dist(r,w)<0.015){
        if(r.isClay&&r.clay>0){assignTask(v,'digclay',r,r.x,r.y);msg('\u2192 Dig clay','info');return;}
        if(!r.isClay&&r.stone>0){assignTask(v,'mine',r,r.x,r.y);msg('\u2192 Mine stone','info');return;}
      }
    }
    // River → fetch water
    if(nearRiver(w.x,w.y,0.025)){
      const rp=riverPts.reduce((a,b)=>dist(b,w)<dist(a,w)?b:a);
      assignTask(v,'fetchwater',rp,rp.x,rp.y);msg('\u2192 Fetch water','info');return;
    }
    // Building → build, farm, operate, study, haul
    for(const b of buildings){
      if(dist(b,w)<0.02){
        if(b.built<1){assignTask(v,'build',b,b.x,b.y);msg('\u2192 Build '+BD[b.type].nm,'info');return;}
        if(['farm','vegfarm','orchard','chickencoop','dairyfarm'].includes(b.type)){assignTask(v,'farm',b,b.x,b.y);msg('\u2192 Work at '+BD[b.type].nm,'info');return;}
        if(b.type==='cheesemaker'){assignTask(v,'makecheese',b,b.x,b.y);msg('\u2192 Making cheese','info');return;}
        if(b.type==='claypit'){if(R.clay>=getStorageCap('clay')){msg('Clay storage full!','warn');return;}assignTask(v,'workclay',b,b.x,b.y);msg('\u2192 Working clay pit','info');return;}
        if(b.type==='quarry'){if(R.stone>=getStorageCap('stone')){msg('Stone storage full!','warn');return;}assignTask(v,'workstone',b,b.x,b.y);msg('\u2192 Working quarry','info');return;}
        if(b.type==='well'){assignTask(v,'well',b,b.x,b.y);msg('\u2192 Operate well','info');return;}
        if(b.type==='hunterhut'){
          const prey=animals.filter(a=>['antelope','rabbit','ostrich','chicken'].includes(a.type)&&a.hp>0).sort((a,bb)=>dist(a,v)-dist(bb,v))[0];
          if(prey){assignTask(v,'hunt',prey,prey.x,prey.y);msg('\u2192 Hunt from hut','info');}
          else msg('No wildlife to hunt right now.','warn');
          return;
        }
        if(b.type==='fishinghut'){
          if(R.fish>=getStorageCap('fish')){msg('Fish storage full!','warn');return;}
          assignTask(v,'fish',b,b.x,b.y);msg('\u2192 Fishing','info');return;
        }
        if(b.type==='gathererhut'){
          const bush=berryBushes.filter(bb=>bb.berries>0).sort((a,bb)=>dist(a,v)-dist(bb,v))[0];
          if(bush){assignTask(v,'gather',bush,bush.x,bush.y);msg('\u2192 Gather from hut','info');}
          else msg('No berries or mushrooms to gather right now.','warn');
          return;
        }
        if(b.type==='school'){assignTask(v,'study',b,b.x,b.y);msg('\u2192 Study at school','info');return;}
        if(b.type==='watchtower'){
          const dang=animals.filter(a=>['lion','croc','hippo'].includes(a.type)&&a.hp>0).sort((a,bb)=>dist(a,v)-dist(bb,v))[0];
          if(dang){assignTask(v,'wildlifecontrol',dang,dang.x,dang.y);msg('\u2192 Wildlife control: '+dang.type+' (VERY DANGEROUS!)','bad');}
          else msg('No dangerous wildlife spotted.','info');
          return;
        }
        if(['guardpost','barracks','armory'].includes(b.type)){assignTask(v,'guard',b,b.x,b.y);msg('\u2192 Guard duty (protects against raids)','info');return;}
        if(b.type==='latrine'&&(b.waste||0)>3){
          // Haul waste from this latrine to nearest treatment site, or farm if none
          let dest=buildings.filter(bb=>['compost','biogas','treatment'].includes(bb.type)&&bb.built>=1&&(bb.wasteStored||0)<(BD[bb.type].wasteCap||15)*(bb.level||1)).sort((a,bb)=>dist(a,b)-dist(bb,b))[0];
          if(!dest){
            dest=buildings.filter(bb=>bb.type==='farm'&&bb.built>=1).sort((a,bb)=>dist(a,b)-dist(bb,b))[0];
            if(dest){msg('\u26A0 No treatment site — hauling raw waste to farm (increases disease!)','warn');}
          }
          if(!dest){msg('Build a Compost Site, Biogas Reactor, Treatment Plant, or at least a Farm!','bad');return;}
          v._haulDest=dest;assignTask(v,'haul',b,b.x,b.y);msg('\u2192 Haul waste to '+BD[dest.type].nm,'info');return;
        }
        // Try upgrade or select
        selected=b;updateSelPanel();return;
      }
    }
    // Pipe → build pipe
    for(const pipe of pipes){
      if(pipe.built>=1)continue;
      const mid={x:(pipe.from.x+pipe.to.x)/2,y:(pipe.from.y+pipe.to.y)/2};
      if(dist(mid,w)<0.025){assignTask(v,'buildpipe',pipe,mid.x,mid.y);msg('→ Build sewer pipe','info');return;}
    }
    // Empty ground → move there
    assignTask(v,'move',null,w.x,w.y);
    return;
  }

  // Nothing selected — try to select something
  // Villagers first
  for(const v of villagers){
    if(dist(v,w)<0.012){selected=v;msg('Villager selected — click a tree, river, or building to assign','info');updateSelPanel();return;}
  }
  // Buildings
  for(const b of buildings){
    if(dist(b,w)<0.02){selected=b;updateSelPanel();return;}
  }
  // Huts (just info)
  for(const h of huts){
    if(dist(h,w)<0.015){msg('Hut (houses '+5+' villagers)','info');return;}
  }
  // Nothing
  selected=null;hideSelPanel();
});

  fetchwater:'watercarrier',well:'watercarrier',haul:'hauler',build:'builder',buildpipe:'builder',gather:'gatherer',makecheese:'cheesemaker',wildlifecontrol:'ranger',guard:'guard',workclay:'mason',workstone:'miner'};
const PROF_COLORS={
  forester:{shirt:'#2d6b1e',wrap:'#4a3a20',hat:'#3d5a10'},
  hunter:{shirt:'#6a3a1a',wrap:'#4a3020',hat:'#5a2a0a'},
  fisher:{shirt:'#2a6a8a',wrap:'#3a5a6a',hat:'#1a4a6a'},
  farmer:{shirt:'#8a7a20',wrap:'#6a5a10',hat:'#a09030'},
  miner:{shirt:'#5a5a5a',wrap:'#4a4a4a',hat:'#6a6a6a'},

  watercarrier:{shirt:'#3070a0',wrap:'#5090b0',hat:'#2060a0'},
  hauler:{shirt:'#7a6030',wrap:'#5a4a20',hat:'#8a7040'},
  builder:{shirt:'#a06020',wrap:'#806030',hat:'#c08030'},
  gatherer:{shirt:'#6a8a2a',wrap:'#4a6a1a',hat:'#8aaa3a'},

  ranger:{shirt:'#4a5a20',wrap:'#3a4a10',hat:'#6a7a30'},
  guard:{shirt:'#4a4a5a',wrap:'#3a3a4a',hat:'#5a5a6a'},
};
const PROF_NAMES={forester:'Forester',hunter:'Hunter',fisher:'Fisher',farmer:'Farmer',miner:'Miner',
  mason:'Mason',watercarrier:'Water Carrier',hauler:'Hauler',builder:'Builder',gatherer:'Gatherer',cheesemaker:'Cheese Maker',ranger:'Wildlife Ranger',guard:'Guard'};

function assignTask(v,task,target,tx,ty){
  const newProf=PROF_MAP[task];
  // If villager has a profession and this task doesn't match, block it (allow move/study/return)
  if(v.prof&&newProf&&newProf!==v.prof&&!['move','study','return'].includes(task)){
    msg(PROF_NAMES[v.prof]+' cannot do that — fire them first (select + click Fire)','warn');return;
  }
  v.task=task;v.target=target;v.tx=tx;v.ty=ty;v.taskTimer=0;
  if(task!=='return'){v._prevTask=task;v._prevTarget=target;}
  if(task!=='farm')v.carrying=null;
  if(task!=='farm')v.carryAmt=0;
  // Assign profession on first real task (not move/study/return/idle, not children)
  if(newProf&&!v.prof&&!v.isChild){
    v.prof=newProf;
    const pc=PROF_COLORS[newProf];if(pc){v.shirt=pc.shirt;v.wrap=pc.wrap;}
    msg('Villager is now a '+PROF_NAMES[newProf]+'!','info');
  }
  updateSelPanel();
}

window.fireVillager=function(){
  if(!selected||!selected.skin||!selected.prof)return;
  msg(PROF_NAMES[selected.prof]+' relieved of duties.','info');
  selected.prof=null;selected.task='idle';selected.target=null;
  // Restore random clothing
  const clothes=[['#c04020','#e8d0a0'],['#2060a0','#d0c090'],['#d4a020','#f0e8d0'],['#208040','#c8b888'],['#8040a0','#e0d0c0']];
  const cl=clothes[(Math.random()*clothes.length)|0];selected.shirt=cl[0];selected.wrap=cl[1];
  updateSelPanel();
};

    if(!tip)for(const b of buildings){if(dist(b,w)<0.015){const bd=BD[b.type];const lv=b.level||1;
