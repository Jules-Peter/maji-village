// ══ BUILDING ══
function tryBuild(type,wx,wy){
  const bd=BD[type];
  if(bd.phase>S.phase){msg('Unlock Phase '+(bd.phase+1)+' first!','bad');return;}
  if(R.coin<bd.coin||R.wood<bd.wood||R.stone<(bd.stone||0)||R.clay<(bd.clay||0)){msg('Not enough resources!','bad');return;}

  // ─ SEWER PIPE special: click latrine first, then river/treatment ─
  if(type==='sewer'){
    if(!pipeMode){
      // First click: find a latrine to connect FROM
      const src=buildings.find(b=>b.type==='latrine'&&b.built>=1&&dist(b,{x:wx,y:wy})<0.02);
      if(!src){msg('Click on a built latrine to connect FROM','warn');return;}
      // Check not already piped
      if(pipes.some(p=>p.fromB===src)){msg('This latrine is already connected!','bad');return;}
      pipeMode={from:src};
      msg('Now click the river or a treatment plant to connect TO','info');
      return;
    }else{
      // Second click: river or treatment plant
      const isRiver=nearRiver(wx,wy,0.025);
      const treatmentB=buildings.find(b=>b.type==='treatment'&&b.built>=1&&dist(b,{x:wx,y:wy})<0.025);
      if(!isRiver&&!treatmentB){msg('Click the river or a treatment plant!','warn');return;}
      R.coin-=bd.coin;R.wood-=bd.wood;R.stone-=(bd.stone||0);R.clay-=(bd.clay||0);
      const toPos=isRiver?riverPts.reduce((a,b)=>dist(b,{x:wx,y:wy})<dist(a,{x:wx,y:wy})?b:a):{x:treatmentB.x,y:treatmentB.y};
      pipes.push({from:{x:pipeMode.from.x,y:pipeMode.from.y},to:{x:toPos.x,y:toPos.y},built:0,fromB:pipeMode.from,toB:treatmentB||'river'});
      msg('Sewer pipe placed! Assign a villager to build it.','warn');
      pipeMode=null;buildMode=null;updateBuildBar();updateHUD();
      return;
    }
  }

  if(type==='fishinghut'){
    if(!nearRiver(wx,wy,0.04)&&!nearLake(wx,wy,0.03)){msg('Fishing Hut must be built near a river or lake!','bad');return;}
  }else{
    if(nearRiver(wx,wy,0.025)){msg("Can't build in the river!",'bad');return;}
    if(nearLake(wx,wy,0.01)){msg("Can't build in a lake!",'bad');return;}
  }
  if(nearMountain(wx,wy,0.03)){msg("Can't build on a mountain!",'bad');return;}
  if(Math.hypot(wx-0.5,wy-0.5)<0.02){msg("That's the marketplace!",'bad');return;}
  for(const b of buildings)if(dist(b,{x:wx,y:wy})<0.02){msg('Too close to another building!','bad');return;}

  R.coin-=bd.coin;R.wood-=bd.wood;R.stone-=(bd.stone||0);R.clay-=(bd.clay||0);
  const b={type,x:wx,y:wy,built:0,hp:100,workers:[],age:0,level:1};
  buildings.push(b);
  msg(bd.nm+' placed! Assign a villager to build it.','warn');
  if(bd.type==='house'){S.housing+=bd.cap;}
  buildMode=null;updateBuildBar();updateHUD();
}

// ══ BUILDING UPGRADE ══
window.upgradeBuilding=function(){
  if(!selected||selected.hp===undefined)return; // only buildings (no hp on villagers? actually villagers have hp too)
  // Must be a building (no isChild, no skin etc)
  if(selected.skin)return;
  const b=selected;const bd=BD[b.type];if(!bd)return;
  const lv=b.level||1;if(lv>=bd.maxLv)return;
  const cost={coin:Math.floor(bd.coin*lv*0.8),wood:Math.floor(bd.wood*lv*0.6),stone:Math.floor((bd.stone||0)*lv*0.6),clay:Math.floor((bd.clay||0)*lv*0.6)};
  if(R.coin<cost.coin||R.wood<cost.wood||R.stone<cost.stone||R.clay<cost.clay){msg('Not enough resources to upgrade!','bad');return;}
  R.coin-=cost.coin;R.wood-=cost.wood;R.stone-=cost.stone;R.clay-=cost.clay;
  b.level=(lv)+1;b.hp=100;
  // Upgraded buildings get better stats (applied in monthly tick via level multiplier)
  msg(bd.nm+' upgraded to Lv'+(lv+1)+'!','good');
  updateSelPanel();updateHUD();
};

// ══ VILLAGER AI ══
function updateVillagers(){
  for(const v of villagers){
    if(v.hp<=0)continue;
    v.walkFrame+=speed*0.15;

    // Hunger / thirst decay (slow — roughly 1 month to drain)
    v.hunger-=0.003*speed;v.thirst-=0.004*speed;
    if(v.hunger<=0||v.thirst<=0){v.hp-=0.05*speed;v.sick=true;}
    if(v.sick&&v.hp>0)v.hp-=0.008*speed;
    if(v.hp<=0){v.task='dead';msg('A villager has died!','bad');S.deaths++;continue;}

    // Feed from stockpile — diverse diet gives massive bonuses
    if(v.hunger<40){
      // Count food variety available (guard undefined)
      const avail=[(R.food||0)>0,(R.meat||0)>0,(R.fish||0)>0,(R.vegetables||0)>0,(R.fruit||0)>0,(R.eggs||0)>0,(R.berries||0)>0,(R.milk||0)>0,(R.cheese||0)>0].filter(Boolean).length;
      if(avail>=4){
        // Feast — eat one of each available for huge bonus
        if(R.food>0)R.food--;if(R.meat>0)R.meat--;if(R.vegetables>0)R.vegetables--;if(R.fruit>0)R.fruit--;if(R.cheese>0)R.cheese--;
        v.hunger=Math.min(100,v.hunger+50);v.dietDiv=(v.dietDiv||0)+4;
      }else if(avail>=2){
        // Decent meal — pick two different things
        const ate=[];
        for(const [k,h] of [['cheese',32],['berries',20],['meat',30],['milk',22],['vegetables',28],['fruit',22],['eggs',25],['fish',25],['food',25]]){
          if(R[k]>0&&ate.length<2){R[k]--;ate.push(k);}
        }
        v.hunger=Math.min(100,v.hunger+35);v.dietDiv=(v.dietDiv||0)+ate.length;
      }else{
        // Single food source
        for(const k of ['food','meat','fish','vegetables','fruit','eggs','berries','milk','cheese']){
          if(R[k]>0){R[k]--;v.hunger=Math.min(100,v.hunger+22);break;}
        }
      }
    }
    if(v.thirst<40&&R.water>0){R.water--;v.thirst=Math.min(100,v.thirst+30);}
    // Diet diversity health bonus — diverse meals heal over time
    if((v.dietDiv||0)>3&&v.hp<100){v.hp=Math.min(100,v.hp+0.02*speed);if(v.sick&&Math.random()<0.001*speed)v.sick=false;}
    // Clinic heals
    if(v.sick&&buildings.some(b=>b.type==='clinic'&&b.built>=1)&&Math.random()<0.002*speed)v.sick=false;

    const d=dist(v,{x:v.tx,y:v.ty});
    if(d>0.003){
      // Walk toward target
      const dx=v.tx-v.x,dy=v.ty-v.y;
      const step=v.speed*speed;
      v.x+=dx/d*step;v.y+=dy/d*step;
      v.dir=dx>0?1:-1;
    } else {
      // At target — execute task
      v.taskTimer+=speed;

      // Dance: wiggle in place, no work
      if(v.task==='dance'){
        v.x+=Math.sin(tick*0.15+v.y*1000)*0.0002;
        v.dir=Math.sin(tick*0.1+v.x*500)>0?1:-1;
        continue;
      }

      if(v.task==='chop'&&v.target){
        if(v.target.wood<=0){
          // Tree depleted — find nearest tree with wood
          const next=trees.filter(t=>t.wood>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
          if(next){v.target=next;v.tx=next.x;v.ty=next.y;v._prevTarget=next;v.taskTimer=0;}
          else{v.task='idle';v.target=null;}
          continue;
        }
        v.target.chopping=true;
        if(v.taskTimer>25){
          v.taskTimer=0;v.target.wood--;v.carryAmt++;v.carrying='wood';
          if(v.carryAmt>=4||v.target.wood<=0){
            v.task='return';v.tx=0.5;v.ty=0.5;v.target.chopping=false;
          }
        }
      }
      else if(v.task==='mine'&&v.target){
        if(!v.target.stone||v.target.stone<=0){
          const next=rocks.filter(r=>!r.isClay&&r.stone>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
          if(next){v.target=next;v.tx=next.x;v.ty=next.y;v._prevTarget=next;v.taskTimer=0;}
          else{v.task='idle';v.target=null;}
          continue;
        }
        v.target.mining=true;
        if(v.taskTimer>30){
          v.taskTimer=0;v.target.stone--;v.carryAmt++;v.carrying='stone';
          if(v.carryAmt>=3||v.target.stone<=0){v.task='return';v.tx=0.5;v.ty=0.5;v.target.mining=false;}
        }
      }
      else if(v.task==='digclay'&&v.target){
        if(!v.target.clay||v.target.clay<=0){
          const next=rocks.filter(r=>r.isClay&&r.clay>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
          if(next){v.target=next;v.tx=next.x;v.ty=next.y;v._prevTarget=next;v.taskTimer=0;}
          else{v.task='idle';v.target=null;}
          continue;
        }
        v.target.mining=true;
        if(v.taskTimer>20){
          v.taskTimer=0;v.target.clay--;v.carryAmt++;v.carrying='clay';
          if(v.carryAmt>=4||v.target.clay<=0){v.task='return';v.tx=0.5;v.ty=0.5;v.target.mining=false;}
        }
      }
      else if(v.task==='workclay'&&v.target){
        if(v.target.built<1){v.task='idle';continue;}
        if(R.clay>=getStorageCap('clay')){v.task='idle';v.target=null;msg('Clay storage full!','warn');continue;}
        if(v.taskTimer>25){
          v.taskTimer=0;const lv=v.target.level||1;const amt=1+lv+((v.edu||0)>40?1:0);
          v.carrying='clay';v.carryAmt=amt;
          v.task='return';v.tx=0.5;v.ty=0.5;
        }
      }
      else if(v.task==='workstone'&&v.target){
        if(v.target.built<1){v.task='idle';continue;}
        if(R.stone>=getStorageCap('stone')){v.task='idle';v.target=null;msg('Stone storage full!','warn');continue;}
        if(v.taskTimer>30){
          v.taskTimer=0;const lv=v.target.level||1;const amt=1+lv+((v.edu||0)>40?1:0);
          v.carrying='stone';v.carryAmt=amt;
          v.task='return';v.tx=0.5;v.ty=0.5;
        }
      }
      else if(v.task==='fetchwater'){
        if(R.water>=getStorageCap('water')){v.task='idle';v.target=null;msg('Water storage full! Build a Reservoir for more capacity.','warn');continue;}
        if(v.taskTimer>15){
          v.taskTimer=0;v.carrying='water';v.carryAmt=3;
          v.task='return';v.tx=0.5;v.ty=0.5;
        }
      }
      else if(v.task==='well'&&v.target){
        if(v.target.built<1){v.task='idle';continue;}
        if(R.water>=getStorageCap('water')){v.task='idle';v.target=null;msg('Water storage full! Build a Reservoir for more capacity.','warn');continue;}
        if(v.taskTimer>12){
          v.taskTimer=0;v.carrying='water';v.carryAmt=5;
          v.task='return';v.tx=0.5;v.ty=0.5;
        }
      }
      else if(v.task==='fish'&&v.target){
        if(v.target.built<1){v.task='idle';continue;}
        if(R.fish>=getStorageCap('fish')){v.task='idle';v.target=null;msg('Fish storage full!','warn');continue;}
        const fishLv=v.target.level||1;
        if(v.taskTimer>18){
          v.taskTimer=0;v.carrying='fish';v.carryAmt=2+fishLv+((v.edu||0)>40?1:0);
          v.task='return';v.tx=0.5;v.ty=0.5;
        }
      }
      else if(v.task==='farm'&&v.target){
        if(v.target.built<1){v.task='idle';continue;}
        const farm=v.target;
        const ftype=farm.type;
        const produce=BD[ftype]&&BD[ftype].produce?BD[ftype].produce:'food';
        const hasCompost=buildings.some(b=>b.type==='compost'&&b.built>=1&&(b.compostProduced||0)>0);
        const hasRawWaste=(farm.rawWaste||0)>0;
        const farmLv=farm.level||1;
        let farmYield;
        if(hasCompost){farmYield=3+farmLv+((v.edu||0)>50?2:0);}
        else if(hasRawWaste){farmYield=2+farmLv;farm.rawWaste=(farm.rawWaste||0)-1;}
        else{farmYield=1+Math.floor(farmLv*0.5);}
        // Chicken coop produces eggs passively without compost dependency
        if(ftype==='chickencoop'){farmYield=2+farmLv+((v.edu||0)>40?1:0);}
        // Dairy farm produces milk — needs water and food (feed the cows)
        if(ftype==='dairyfarm'){farmYield=2+farmLv+(R.food>5?1:0);if(R.food>3){R.food-=1;}}
        // Vegfarm and orchard scale with level
        if(ftype==='vegfarm'){farmYield=2+farmLv+((v.edu||0)>40?1:0);}
        if(ftype==='orchard'){farmYield=2+farmLv;}
        if(v.taskTimer>20){
          v.taskTimer=0;v.carrying=produce;v.carryAmt=farmYield;
          if(hasRawWaste&&!hasCompost&&ftype!=='chickencoop'){S.disease=Math.min(100,S.disease+0.5);S.helm=Math.min(100,S.helm+0.3);}
          v.task='return';v.tx=0.5;v.ty=0.5;
        }
      }
      else if(v.task==='hunt'&&v.target){
        // Chase the animal
        const prey=v.target;
        if(!prey||prey.hp<=0||!animals.includes(prey)){
          // Prey dead or gone — find another
          const next=animals.filter(a=>['antelope','rabbit','ostrich','chicken'].includes(a.type)&&a.hp>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
          if(next){v.target=next;v.tx=next.x;v.ty=next.y;v._prevTarget=next;v.taskTimer=0;}
          else{v.task='idle';v.target=null;}
          continue;
        }
        // Update target position (animal moves)
        v.tx=prey.x;v.ty=prey.y;
        if(dist(v,prey)<0.008){
          v.taskTimer+=speed;
          if(v.taskTimer>15){
            prey.hp-=25;v.taskTimer=0;
            if(prey.hp<=0){
              const loot={antelope:{res:'meat',amt:6,nm:'Antelope'},rabbit:{res:'meat',amt:2,nm:'Rabbit'},ostrich:{res:'meat',amt:5,nm:'Ostrich'},chicken:{res:'eggs',amt:3,nm:'Chicken'}}[prey.type]||{res:'meat',amt:4,nm:'Animal'};
              msg(loot.nm+' hunted! +'+loot.amt+' '+loot.res,'good');
              animals=animals.filter(a=>a!==prey);
              v.carrying=loot.res;v.carryAmt=loot.amt;
              v.task='return';v.tx=0.5;v.ty=0.5;
            }
          }
        }
      }
      else if(v.task==='gather'&&v.target){
        const bush=v.target;
        if(!bush||bush.berries<=0||!berryBushes.includes(bush)){
          const next=berryBushes.filter(b=>b.berries>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
          if(next){v.target=next;v.tx=next.x;v.ty=next.y;v._prevTarget=next;v.taskTimer=0;}
          else{v.task='idle';v.target=null;}
          continue;
        }
        // Lion danger! Check nearby lions while gathering
        const nearLion=animals.find(a=>a.type==='lion'&&dist(a,v)<0.04);
        if(nearLion&&Math.random()<0.02*speed){
          // Lion attacks gatherer!
          v.hp-=nearLion.dmg;
          msg('Lion attacked gatherer while foraging!','bad');
          v.task='idle';v.target=null;
          continue;
        }
        if(v.taskTimer>22){
          v.taskTimer=0;
          const amt=Math.min(bush.berries,2+((v.edu||0)>40?1:0));
          bush.berries-=amt;v.carrying='berries';v.carryAmt=amt;
          msg('+'+ amt+' '+(bush.type==='mushroom'?'mushrooms':'berries')+(nearLion?' (lion nearby!)':''),'info');
          v.task='return';v.tx=0.5;v.ty=0.5;
        }
      }
      else if(v.task==='makecheese'&&v.target){
        if(v.target.built<1){v.task='idle';continue;}
        if((R.milk||0)<2){v.task='idle';v.target=null;msg('Need milk to make cheese! Build a Dairy Farm.','warn');continue;}
        if(v.taskTimer>18){
          v.taskTimer=0;R.milk-=2;
          const amt=1+(v.target.level||1>1?1:0)+((v.edu||0)>50?1:0);
          v.carrying='cheese';v.carryAmt=amt;
          v.task='return';v.tx=0.5;v.ty=0.5;
        }
      }
      else if(v.task==='wildlifecontrol'){
        // Wildlife manager — attacks dangerous animals
        const prey=v.target;
        if(!prey||prey.hp<=0||!animals.includes(prey)){
          // Find next dangerous animal
          const next=animals.filter(a=>['lion','croc','hippo'].includes(a.type)&&a.hp>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
          if(next){v.target=next;v.tx=next.x;v.ty=next.y;}
          else{v.task='idle';v.target=null;msg('No dangerous animals to manage.','info');}
          continue;
        }
        v.tx=prey.x;v.ty=prey.y;
        if(dist(v,prey)<0.008){
          v.taskTimer+=speed;
          if(v.taskTimer>12){
            v.taskTimer=0;
            // 1:50 chance the manager survives each hit (2% survival per engagement)
            if(Math.random()<0.98){
              // Wildlife manager is killed!
              v.hp=0;
              msg('Wildlife manager was killed fighting a '+prey.type+'!','bad');
              for(let b=0;b<6;b++)bloodParticles.push({x:v.x+(Math.random()-0.5)*0.004,y:v.y+(Math.random()-0.5)*0.003,age:0,maxAge:350+Math.random()*200,sz:1+Math.random()*2});
            }else{
              // Manager successfully fought the animal!
              prey.hp-=40;
              if(prey.hp<=0){
                msg('Wildlife manager killed a '+prey.type+'! Hero!','good');
                animals=animals.filter(a=>a!==prey);
                v.task='idle';v.target=null;
              }else{
                msg('Wildlife manager wounded the '+prey.type+'!','info');
              }
            }
          }
        }
      }
      else if(v.task==='guard'&&v.target){
        if(v.target.built<1){v.task='idle';continue;}
        // Guard patrols around the building
        if(v.taskTimer>80+Math.random()*60){
          v.taskTimer=0;
          const b=v.target;
          v.tx=b.x+(Math.random()-0.5)*0.03;v.ty=b.y+(Math.random()-0.5)*0.02;
        }
      }
      else if(v.task==='study'&&v.target){
        if(v.target.built<1){v.task='idle';continue;}
        v.taskTimer+=speed;
        if(v.taskTimer>10){
          v.taskTimer=0;
          v.edu=Math.min(100,(v.edu||0)+2*(v.target.level||1));
          if(v.edu>=100&&Math.random()<0.05){msg('Villager graduated!','good');v.task='idle';continue;}
        }
      }
      else if(v.task==='haul'&&v.target){
        // Phase 1: at latrine — pick up waste
        if(!v.carrying&&v.target.type==='latrine'){
          const amt=Math.min(v.target.waste||0,5);
          if(amt<=0){v.task='idle';v.target=null;continue;}
          v.target.waste=(v.target.waste||0)-amt;
          v.carrying='waste';v.carryAmt=amt;
          // Go to destination
          const dest=v._haulDest;
          if(dest&&buildings.includes(dest)&&dest.built>=1){
            v.tx=dest.x;v.ty=dest.y;v._haulPhase='deliver';v._haulSrc=v.target;v.target=dest;
          }else{v.task='idle';v.carrying=null;v.carryAmt=0;}
          continue;
        }
        // Phase 2: at treatment site or farm — drop off waste
        if(v.carrying==='waste'&&v._haulPhase==='deliver'){
          const dest=v.target;
          if(dest.type==='farm'){
            // Raw waste to farm — works as fertilizer but causes disease
            dest.rawWaste=(dest.rawWaste||0)+v.carryAmt;
            msg('Raw waste applied to farm — disease risk!','warn');
            S.disease=Math.min(100,S.disease+0.8);S.helm=Math.min(100,S.helm+0.5);
          }else{
            const cap=(BD[dest.type].wasteCap||15)*(dest.level||1);
            const space=cap-(dest.wasteStored||0);
            const drop=Math.min(v.carryAmt,space);
            dest.wasteStored=(dest.wasteStored||0)+drop;
          }
          v.carrying=null;v.carryAmt=0;v._haulPhase=null;
          // Auto-repeat: find any latrine with waste
          let nextSrc=v._haulSrc;
          if(!nextSrc||!buildings.includes(nextSrc)||nextSrc.built<1||(nextSrc.waste||0)<=2){
            nextSrc=buildings.filter(bb=>bb.type==='latrine'&&bb.built>=1&&(bb.waste||0)>2).sort((a,bb)=>dist(a,v)-dist(bb,v))[0]||null;
          }
          // Also find a dest with capacity (treatment sites preferred, farms as fallback)
          let nextDest=dest;
          if(!nextDest||!buildings.includes(nextDest)||(nextDest.type!=='farm'&&(nextDest.wasteStored||0)>=(BD[nextDest.type].wasteCap||15)*(nextDest.level||1))){
            nextDest=buildings.filter(bb=>['compost','biogas','treatment'].includes(bb.type)&&bb.built>=1&&(bb.wasteStored||0)<(BD[bb.type].wasteCap||15)*(bb.level||1)).sort((a,bb)=>dist(a,v)-dist(bb,v))[0]||null;
            if(!nextDest)nextDest=buildings.filter(bb=>bb.type==='farm'&&bb.built>=1).sort((a,bb)=>dist(a,v)-dist(bb,v))[0]||null;
          }
          if(nextSrc&&nextDest){
            v.target=nextSrc;v.tx=nextSrc.x;v.ty=nextSrc.y;v._haulDest=nextDest;v._haulSrc=nextSrc;v.taskTimer=0;v._haulPhase=null;
          }else{v.task='idle';v.target=null;}
          continue;
        }
        v.task='idle';
      }
      else if(v.task==='build'&&v.target){
        if(v.target.built>=1){v.task='idle';v.target=null;continue;}
        v.target.built=Math.min(1,v.target.built+0.015*speed);
        if(v.target.built>=1){msg(BD[v.target.type].nm+' complete!','good');v.task='idle';v.target=null;}
      }
      else if(v.task==='buildpipe'&&v.target){
        if(v.target.built>=1){v.task='idle';v.target=null;continue;}
        v.target.built=Math.min(1,v.target.built+0.006*speed);
        if(v.target.built>=1){msg('Sewer pipe complete! Sanitation improved.','good');v.task='idle';v.target=null;}
      }
      else if(v.task==='return'){
        // Drop off resources (capped by storage)
        if(v.carrying&&v.carrying!=='waste'){
          if(R[v.carrying]===undefined)R[v.carrying]=0;
          R[v.carrying]+=v.carryAmt;
          R[v.carrying]=Math.min(R[v.carrying],getStorageCap(v.carrying));
          msg('+'+v.carryAmt+' '+v.carrying+' ('+R[v.carrying]+'/'+getStorageCap(v.carrying)+')','info');
        }
        const prevTarget=v._prevTarget;const prevTask=v._prevTask;
        v.carrying=null;v.carryAmt=0;
        // Auto-repeat
        if(prevTask){
          if(prevTask==='chop'){
            let t=prevTarget&&prevTarget.wood>0?prevTarget:null;
            if(!t)t=trees.filter(t=>t.wood>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(t){v.task='chop';v.target=t;v.tx=t.x;v.ty=t.y;v._prevTarget=t;v.taskTimer=0;continue;}
          }
          if(prevTask==='mine'){
            let r=prevTarget&&prevTarget.stone>0?prevTarget:null;
            if(!r)r=rocks.filter(r=>!r.isClay&&r.stone>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(r){v.task='mine';v.target=r;v.tx=r.x;v.ty=r.y;v._prevTarget=r;v.taskTimer=0;continue;}
          }
          if(prevTask==='digclay'){
            let r=prevTarget&&prevTarget.clay>0?prevTarget:null;
            if(!r)r=rocks.filter(r=>r.isClay&&r.clay>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(r){v.task='digclay';v.target=r;v.tx=r.x;v.ty=r.y;v._prevTarget=r;v.taskTimer=0;continue;}
          }
          if(prevTask==='workclay'&&prevTarget&&prevTarget.built>=1){
            if(R.clay>=getStorageCap('clay')){msg('Clay storage full — worker idle.','warn');}
            else{v.task='workclay';v.target=prevTarget;v.tx=prevTarget.x;v.ty=prevTarget.y;v.taskTimer=0;continue;}
          }
          if(prevTask==='workstone'&&prevTarget&&prevTarget.built>=1){
            if(R.stone>=getStorageCap('stone')){msg('Stone storage full — worker idle.','warn');}
            else{v.task='workstone';v.target=prevTarget;v.tx=prevTarget.x;v.ty=prevTarget.y;v.taskTimer=0;continue;}
          }
          if(prevTask==='fetchwater'){
            if(R.water>=getStorageCap('water')){msg('Water storage full — worker idle.','warn');}
            else{const rp=riverPts.reduce((a,b)=>dist(b,v)<dist(a,v)?b:a);v.task='fetchwater';v.target=rp;v.tx=rp.x;v.ty=rp.y;v.taskTimer=0;continue;}
          }
          if(prevTask==='well'&&prevTarget&&prevTarget.built>=1){
            if(R.water>=getStorageCap('water')){msg('Water storage full — worker idle.','warn');}
            else{v.task='well';v.target=prevTarget;v.tx=prevTarget.x;v.ty=prevTarget.y;v.taskTimer=0;continue;}
          }
          if(prevTask==='fish'&&prevTarget&&prevTarget.built>=1){
            if(R.fish>=getStorageCap('fish')){msg('Fish storage full — worker idle.','warn');}
            else{v.task='fish';v.target=prevTarget;v.tx=prevTarget.x;v.ty=prevTarget.y;v.taskTimer=0;continue;}
          }
          if(prevTask==='farm'&&prevTarget&&prevTarget.built>=1){v.task='farm';v.target=prevTarget;v.tx=prevTarget.x;v.ty=prevTarget.y;v.taskTimer=0;continue;}
          if(prevTask==='hunt'){
            const prey=animals.filter(a=>a.type==='antelope'&&a.hp>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(prey){v.task='hunt';v.target=prey;v.tx=prey.x;v.ty=prey.y;v._prevTarget=prey;v.taskTimer=0;continue;}
          }
          if(prevTask==='makecheese'&&prevTarget&&prevTarget.built>=1&&(R.milk||0)>=2){v.task='makecheese';v.target=prevTarget;v.tx=prevTarget.x;v.ty=prevTarget.y;v.taskTimer=0;continue;}
          if(prevTask==='guard'&&prevTarget&&prevTarget.built>=1){v.task='guard';v.target=prevTarget;v.tx=prevTarget.x;v.ty=prevTarget.y;v.taskTimer=0;continue;}
        }
        v.task='idle';
      }
      else if(v.task==='move'){v.task='idle';}
      else if(v.task==='idle'){
        v.idleTimer+=speed;
        // Profession auto-seek: try to resume work every ~100 ticks
        if(v.prof&&v.idleTimer>60){
          v.idleTimer=0;
          if(v.prof==='forester'){
            const t=trees.filter(t=>t.wood>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(t&&R.wood<getStorageCap('wood')){v.task='chop';v.target=t;v.tx=t.x;v.ty=t.y;v._prevTask='chop';v._prevTarget=t;v.taskTimer=0;continue;}
          }else if(v.prof==='hunter'){
            const prey=animals.filter(a=>['antelope','rabbit','ostrich','chicken'].includes(a.type)&&a.hp>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(prey&&(R.meat<getStorageCap('meat')||R.eggs<getStorageCap('eggs'))){v.task='hunt';v.target=prey;v.tx=prey.x;v.ty=prey.y;v._prevTask='hunt';v._prevTarget=prey;v.taskTimer=0;continue;}
          }else if(v.prof==='fisher'){
            const fh=buildings.filter(b=>b.type==='fishinghut'&&b.built>=1).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(fh&&R.fish<getStorageCap('fish')){v.task='fish';v.target=fh;v.tx=fh.x;v.ty=fh.y;v._prevTask='fish';v._prevTarget=fh;v.taskTimer=0;continue;}
          }else if(v.prof==='farmer'){
            const fm=buildings.filter(b=>['farm','vegfarm','orchard','chickencoop','dairyfarm'].includes(b.type)&&b.built>=1).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            const produce=fm?BD[fm.type].produce||'food':'food';
            if(fm&&R[produce]<getStorageCap(produce)){v.task='farm';v.target=fm;v.tx=fm.x;v.ty=fm.y;v._prevTask='farm';v._prevTarget=fm;v.taskTimer=0;continue;}
          }else if(v.prof==='miner'){
            if(R.stone<getStorageCap('stone')){
              const qr=buildings.filter(b=>b.type==='quarry'&&b.built>=1).sort((a,b)=>dist(a,v)-dist(b,v))[0];
              if(qr){v.task='workstone';v.target=qr;v.tx=qr.x;v.ty=qr.y;v._prevTask='workstone';v._prevTarget=qr;v.taskTimer=0;continue;}
              const r=rocks.filter(r=>!r.isClay&&r.stone>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
              if(r){v.task='mine';v.target=r;v.tx=r.x;v.ty=r.y;v._prevTask='mine';v._prevTarget=r;v.taskTimer=0;continue;}
            }
          }else if(v.prof==='mason'){
            if(R.clay<getStorageCap('clay')){
              const cp=buildings.filter(b=>b.type==='claypit'&&b.built>=1).sort((a,b)=>dist(a,v)-dist(b,v))[0];
              if(cp){v.task='workclay';v.target=cp;v.tx=cp.x;v.ty=cp.y;v._prevTask='workclay';v._prevTarget=cp;v.taskTimer=0;continue;}
              const r=rocks.filter(r=>r.isClay&&r.clay>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
              if(r){v.task='digclay';v.target=r;v.tx=r.x;v.ty=r.y;v._prevTask='digclay';v._prevTarget=r;v.taskTimer=0;continue;}
            }
          }else if(v.prof==='watercarrier'){
            if(R.water<getStorageCap('water')){
              const well=buildings.filter(b=>b.type==='well'&&b.built>=1).sort((a,b)=>dist(a,v)-dist(b,v))[0];
              if(well){v.task='well';v.target=well;v.tx=well.x;v.ty=well.y;v._prevTask='well';v._prevTarget=well;v.taskTimer=0;continue;}
              else{const rp=riverPts.reduce((a,b)=>dist(b,v)<dist(a,v)?b:a);v.task='fetchwater';v.target=rp;v.tx=rp.x;v.ty=rp.y;v._prevTask='fetchwater';v._prevTarget=rp;v.taskTimer=0;continue;}
            }
          }else if(v.prof==='hauler'){
            const lat=buildings.filter(b=>b.type==='latrine'&&b.built>=1&&(b.waste||0)>2).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(lat){
              let dest=buildings.filter(bb=>['compost','biogas','treatment'].includes(bb.type)&&bb.built>=1&&(bb.wasteStored||0)<(BD[bb.type].wasteCap||15)*(bb.level||1)).sort((a,b)=>dist(a,v)-dist(b,v))[0];
              if(!dest)dest=buildings.filter(bb=>bb.type==='farm'&&bb.built>=1).sort((a,b)=>dist(a,v)-dist(b,v))[0];
              if(dest){v._haulDest=dest;v._haulSrc=lat;v.task='haul';v.target=lat;v.tx=lat.x;v.ty=lat.y;v._prevTask='haul';v.taskTimer=0;continue;}
            }
          }else if(v.prof==='gatherer'){
            const bush=berryBushes.filter(b=>b.berries>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(bush&&R.berries<getStorageCap('berries')){v.task='gather';v.target=bush;v.tx=bush.x;v.ty=bush.y;v._prevTask='gather';v._prevTarget=bush;v.taskTimer=0;continue;}
          }else if(v.prof==='cheesemaker'){
            const cm=buildings.filter(b=>b.type==='cheesemaker'&&b.built>=1).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(cm&&(R.milk||0)>=2&&(R.cheese||0)<getStorageCap('cheese')){v.task='makecheese';v.target=cm;v.tx=cm.x;v.ty=cm.y;v._prevTask='makecheese';v._prevTarget=cm;v.taskTimer=0;continue;}
          }else if(v.prof==='ranger'){
            const dang=animals.filter(a=>['lion','croc','hippo'].includes(a.type)&&a.hp>0).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(dang){v.task='wildlifecontrol';v.target=dang;v.tx=dang.x;v.ty=dang.y;v._prevTask='wildlifecontrol';v._prevTarget=dang;v.taskTimer=0;continue;}
          }else if(v.prof==='guard'){
            const gp=buildings.filter(b=>['guardpost','barracks','armory','watchtower'].includes(b.type)&&b.built>=1).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(gp){v.task='guard';v.target=gp;v.tx=gp.x;v.ty=gp.y;v._prevTask='guard';v._prevTarget=gp;v.taskTimer=0;continue;}
          }else if(v.prof==='builder'){
            const ub=buildings.filter(b=>b.built<1).sort((a,b)=>dist(a,v)-dist(b,v))[0];
            if(ub){v.task='build';v.target=ub;v.tx=ub.x;v.ty=ub.y;v._prevTask='build';v._prevTarget=ub;v.taskTimer=0;continue;}
          }
          // If nothing found, just wander
          v.tx=v.home.x+(Math.random()-0.5)*0.02;v.ty=v.home.y+(Math.random()-0.5)*0.015;
        }else if(v.idleTimer>80){
          v.idleTimer=0;
          // Wander near home
          v.tx=v.home.x+(Math.random()-0.5)*0.02;
          v.ty=v.home.y+(Math.random()-0.5)*0.015;
        }
      }
    }
  }
  // Remove dead
  villagers=villagers.filter(v=>v.hp>0);
  S.pop=villagers.length;
}

// ══ MONTHLY TICK ══
function advanceMonth(){
  S.month++;
  const mo=((S.month-1)%12)+1;
  const season=[12,1,2].includes(mo)?'hot':[3,4].includes(mo)?'cool':[5,6,7,8].includes(mo)?'wet':'dry';

  // ─ Maintenance costs ─
  let maintTotal=0;
  for(const b of buildings){if(b.built>=1)maintTotal+=BD[b.type].maint||0;}
  R.coin-=maintTotal;
  if(maintTotal>0)msg('Maintenance: -'+maintTotal+' coins','warn');

  // ─ Tax income from population ─
  const taxInc=Math.floor(S.pop*5)+20;
  R.coin+=taxInc;

  // ─ INCOME BUILDINGS ─
  let bldInc=0;
  for(const b of buildings){
    if(b.built<1)continue;const lv=b.level||1;
    if(b.type==='marketplace'){R.coin+=10*lv;bldInc+=10*lv;}
    if(b.type==='tradingpost'){R.coin+=20*lv;bldInc+=20*lv;}
    if(b.type==='workshop'){
      // Convert raw materials to goods (coins)
      if(R.wood>=3&&R.stone>=1){R.wood-=3;R.stone-=1;R.coin+=30*lv;bldInc+=30*lv;}
    }
    if(b.type==='inn'){R.coin+=12*lv;bldInc+=12*lv;}
  }
  // Monthly income summary message
  const netMonthly=taxInc+bldInc-maintTotal;
  if(netMonthly>=0)msg('Income: +'+taxInc+' tax'+(bldInc>0?' +'+bldInc+' buildings':'')+' -'+maintTotal+' maint = +'+netMonthly+' net','info');
  else msg('Income: +'+taxInc+' tax'+(bldInc>0?' +'+bldInc+' buildings':'')+' -'+maintTotal+' maint = '+netMonthly+' net (losing money!)','warn');

  // ─ TRADER SPAWNING ─
  const tradeScore=getTradeScore();
  const traderChance=Math.min(0.8,tradeScore/80); // higher score = more traders
  if(traders.length<3&&Math.random()<traderChance){
    spawnTrader();
    const lastTrader=traders[traders.length-1];
    const tKind=lastTrader?(lastTrader.kind||'trader'):'trader';
    msg('A '+tKind+' is approaching the village!','info');
  }

  // ─ WASTE GENERATION (population → latrine waste) ─
  const wastePerMonth=Math.ceil(S.pop*0.8);
  const latrines=buildings.filter(b=>b.type==='latrine'&&b.built>=1);
  let wasteToDistribute=wastePerMonth;
  for(const lat of latrines){
    const cap=(BD.latrine.latrineWasteCap||20)*(lat.level||1);
    const space=cap-(lat.waste||0);
    const add=Math.min(space,wasteToDistribute);
    lat.waste=(lat.waste||0)+add;
    wasteToDistribute-=add;
    if(wasteToDistribute<=0)break;
  }
  if(wasteToDistribute>0){
    S.od+=wasteToDistribute*3;S.disease+=wasteToDistribute;S.san-=wasteToDistribute*2;
    msg(wasteToDistribute+' waste unmanaged! Build more latrines!','bad');
  }

  // ─ AUTO-TRANSFER waste via sewer pipes to treatment ─
  for(const pipe of pipes){
    if(pipe.built<1)continue;
    const lat=pipe.fromB;const dest=pipe.toB;
    if(lat&&(lat.waste||0)>0&&dest!=='river'){
      const destB=buildings.find(b=>b===dest);
      if(destB&&destB.built>=1){
        const cap=(BD[destB.type].wasteCap||15)*(destB.level||1);
        const space=cap-(destB.wasteStored||0);
        const transfer=Math.min(lat.waste||0,space,10);
        lat.waste-=transfer;destB.wasteStored=(destB.wasteStored||0)+transfer;
      }
    }
  }

  // ─ PROCESS waste at treatment sites ─
  for(const b of buildings){
    if(b.built<1)continue;const lv=b.level||1;
    if(b.type==='compost'&&(b.wasteStored||0)>0){
      const proc=Math.min(b.wasteStored,5*lv);b.wasteStored-=proc;
      b.compostProduced=(b.compostProduced||0)+proc; // farms need this
    }
    if(b.type==='biogas'&&(b.wasteStored||0)>0){
      const proc=Math.min(b.wasteStored,8*lv);b.wasteStored-=proc;
      R.coin+=proc*4*lv; // biogas income
      msg('Biogas: +'+proc*4*lv+' coins','good');
    }
    if(b.type==='treatment'&&(b.wasteStored||0)>0){
      const proc=Math.min(b.wasteStored,15*lv);b.wasteStored-=proc;
      // Best sanitation benefit already from BD stats
    }
  }

  // ─ Stat effects from buildings ─
  let sanBonus=0,odReduce=0,disReduce=0,hlmReduce=0,watBonus=0;
  for(const b of buildings){
    if(b.built<1)continue;const bd=BD[b.type];const lv=b.level||1;
    sanBonus+=bd.san*lv;odReduce+=bd.od*lv;disReduce+=bd.dis*lv;hlmReduce+=bd.hlm*lv;watBonus+=bd.wat*lv;
    if(b.type==='market'){R.coin+=15*lv;}
    if(b.type==='marketplace'){R.coin+=5*lv;} // extra marketplace income from trade activity
    if(b.type==='granary'){R.food+=Math.floor(R.food*0.02*lv);}
    if(b.type==='pottery'&&R.clay>=2){R.clay-=2;R.coin+=25*lv;}
  }
  const builtPipes=pipes.filter(p=>p.built>=1).length;
  sanBonus+=builtPipes*5;odReduce+=builtPipes*5;disReduce+=builtPipes*3;
  watBonus+=builtPipes*(pipes.some(p=>p.built>=1&&p.toB==='river')?-2:3);

  // ─ EDUCATION ─
  const eduLevel=getEduLevel();
  const schools=countBuilt('school');
  if(schools>0){disReduce+=schools*2;hlmReduce+=schools*2;odReduce+=schools*2;}

  // ─ DIET DIVERSITY BONUS ─ villagers with diverse diet improve village health
  const diverseVillagers=villagers.filter(v=>(v.dietDiv||0)>3).length;
  if(diverseVillagers>0){const dietBonus=Math.min(5,diverseVillagers*0.5);disReduce+=dietBonus;hlmReduce+=dietBonus;}
  // Reset diet counters each month so diversity must be maintained
  for(const v of villagers)v.dietDiv=0;

  // Education calms wildlife — reduce hunt radius
  if(eduLevel>20){
    for(const a of animals){
      if(a.type==='lion')a.huntRadius=Math.max(0.03,0.08*(1-eduLevel/150));
      if(a.type==='elephant')a.dmg=Math.max(8,30*(1-eduLevel/120));
    }
  }

  // ─ TREE REGROWTH (requires forestry hut + educated villagers) ─
  if(hasBuilt('forestryhut')&&eduLevel>15){
    const regrowChance=0.05*(eduLevel/50);
    for(const t of trees){
      if(t.wood<t.maxWood&&!t.chopping&&Math.random()<regrowChance)t.wood=Math.min(t.maxWood,t.wood+1);
    }
    // Occasionally spawn new trees if heavily forested education
    if(eduLevel>50&&trees.filter(t=>t.wood>0).length<30&&Math.random()<0.3){
      const a=Math.random()*Math.PI*2,d=0.06+Math.random()*0.14;
      const nx=0.5+Math.cos(a)*d,ny=0.5+Math.sin(a)*d;
      if(!nearRiver(nx,ny,0.025))trees.push({x:nx,y:ny,s:4+Math.random()*6,sw:Math.random()*6,type:'round',wood:5,maxWood:15,chopping:false});
    }
  }

  // ─ Berry bush regrowth — faster in wet season, mushrooms appear in wet season ─
  for(const bb of berryBushes){
    const regrow=season==='wet'?0.15:0.04;
    if(bb.berries<bb.maxBerries&&Math.random()<regrow)bb.berries++;
  }
  // Wet season: extra mushrooms appear near forests
  if(season==='wet'&&berryBushes.filter(b=>b.type==='mushroom'&&b.berries>0).length<6&&Math.random()<0.3){
    const df=denseForests[Math.floor(Math.random()*denseForests.length)];
    if(df){const a=Math.random()*Math.PI*2,d=Math.random()*df.r*1.2;
    const bx=df.x+Math.cos(a)*d,by=df.y+Math.sin(a)*d;
    if(bx>0.05&&bx<0.95&&by>0.05&&by<0.95)berryBushes.push({x:bx,y:by,berries:3+Math.floor(Math.random()*4),maxBerries:7,type:'mushroom'});}
  }

  // ─ Natural decay — STRONGER sanitation pressure ─
  const latrineRatio=latrines.length>0?S.pop/(latrines.length*8):99;// need ~1 latrine per 8 pop
  const sanPenalty=latrineRatio>1?Math.floor((latrineRatio-1)*3):0;
  S.od=Math.min(100,S.od+2+Math.floor(S.pop*0.05)+sanPenalty);
  S.disease=Math.min(100,S.disease+0.8+(S.od>50?2:0)+(S.waterQ<25?2:0));
  S.helm=Math.min(100,S.helm+0.8+(S.od>40?1.5:0));
  S.waterQ=Math.max(0,S.waterQ-1-(S.od>50?2:0));
  S.san=Math.max(0,S.san-2-sanPenalty);

  // ─ Apply building effects (strong) ─
  S.san=Math.min(100,S.san+sanBonus);
  S.od=Math.max(0,S.od-odReduce);
  S.disease=Math.max(0,S.disease-disReduce*0.8);
  S.helm=Math.max(0,S.helm-hlmReduce*0.8);
  S.waterQ=Math.min(100,S.waterQ+watBonus);

  // ─ Season effects (mild) ─
  if(season==='wet'){
    S.disease+=1;S.od+=1;S.waterQ-=1;
    msg('Rainy season','warn');
    // Flood risk — only damages buildings right next to river
    if(Math.random()<0.1){
      const nearRiverB=buildings.filter(b=>nearRiver(b.x,b.y,0.03)&&b.built>=1);
      if(nearRiverB.length>0){
        const target=nearRiverB[(Math.random()*nearRiverB.length)|0];
        target.hp-=20;msg(BD[target.type].nm+' damaged by flooding!','bad');
        if(target.hp<=0){msg(BD[target.type].nm+' destroyed!','bad');buildings=buildings.filter(b=>b!==target);}
      }
    }
  }
  if(season==='hot'){S.waterQ-=1;msg('Dry season','warn');}

  // ─ Disease kills (only at extreme levels) ─
  if(S.disease>70){
    const killChance=(S.disease-70)/400;
    for(const v of villagers){
      if(Math.random()<killChance){v.hp-=30;v.sick=true;}
    }
  }
  // Worms make people sick (mild)
  if(S.helm>50){for(const v of villagers){if(Math.random()<(S.helm-50)/500)v.sick=true;}}

  // ─ New OD zones if sanitation bad ─
  if(S.od>50&&Math.random()<0.3){
    const a=Math.random()*Math.PI*2,d=0.03+Math.random()*0.05;
    const ox=0.5+Math.cos(a)*d,oy=0.5+Math.sin(a)*d;
    if(!nearRiver(ox,oy,0.02))odZones.push({x:ox,y:oy,size:0.008+Math.random()*0.006});
  }
  // Reduce OD zones near latrines/sewers
  for(const od of odZones){for(const b of buildings){if(['latrine','compost','sewer','treatment'].includes(b.type)&&b.built>=1&&dist(od,b)<0.06)od.size-=0.003;}}
  odZones=odZones.filter(od=>od.size>0.003);

  // ─ Population growth (food must sustain population) ─
  const totalFood=(R.food||0)+(R.meat||0)+(R.fish||0)+(R.vegetables||0)+(R.fruit||0)+(R.eggs||0)+(R.berries||0)+(R.milk||0)+(R.cheese||0);
  const foodPerPop=S.pop>0?totalFood/S.pop:99;
  // Count food workers (farmers, fishers, hunters, gatherers) to estimate production capacity
  const foodWorkers=villagers.filter(v=>['farm','fish','hunt','gather','makecheese'].includes(v.task)).length;
  const foodCapacity=foodWorkers*3; // rough estimate: each food worker sustains ~3 people

  // Villagers leave if hungry (food per pop too low for 2+ months)
  if(foodPerPop<1.5&&S.pop>2){
    const hungryCount=villagers.filter(v=>v.hunger<25).length;
    if(hungryCount>=Math.ceil(S.pop*0.3)){
      // Some villagers leave — they don't die, they emigrate
      const leaveCount=Math.min(Math.ceil(hungryCount*0.2),Math.floor(S.pop*0.15),3);
      for(let i=0;i<leaveCount;i++){
        const candidate=villagers.filter(v=>v.hp>0&&v.task!=='dead'&&v.hunger<30).sort((a,b)=>a.hunger-b.hunger)[0];
        if(candidate){
          villagers=villagers.filter(v=>v!==candidate);S.pop--;
        }
      }
      if(leaveCount>0)msg(leaveCount+' villager'+(leaveCount>1?'s':'')+' left — not enough food! ('+totalFood+' food for '+S.pop+' people)','bad');
    }
  }

  // Birth requires food surplus relative to pop — need ~2 food per person in stockpile
  // AND either enough food workers or small enough village
  const canGrow=totalFood>S.pop*2&&R.water>Math.floor(S.pop*0.5)&&(foodCapacity>=S.pop*0.5||S.pop<6);
  if(S.disease<40&&canGrow&&S.pop<S.housing&&S.pop>=2){
    // Diet diversity across village boosts birthrate
    const avgDiet=villagers.length>0?villagers.reduce((s,v)=>s+(v.dietDiv||0),0)/villagers.length:0;
    const dietBonus=avgDiet>10?0.25:avgDiet>5?0.15:0;
    let birthChance=0.35+dietBonus;
    if(festivalBirthBoost>0)birthChance=1.0;
    // Slow growth at larger populations — need proportionally more surplus
    if(S.pop>10)birthChance*=0.8;
    if(S.pop>20)birthChance*=0.7;
    if(Math.random()<birthChance){spawnVillager();
      const reason=festivalBirthBoost>0?' (festival!)':dietBonus>0?' (healthy diet!)':'';
      msg('A new villager has arrived!'+reason,'good');}
    if(festivalBirthBoost>0)festivalBirthBoost--;
  }

  // ─ Flowers near prosperity ─
  if(S.san>30&&flowers.length<40&&Math.random()<0.3){
    const a=Math.random()*Math.PI*2,d=Math.random()*0.08;
    flowers.push({x:0.5+Math.cos(a)*d,y:0.5+Math.sin(a)*d,col:['#ff6b9d','#ffd93d','#c084fc','#fb923c'][Math.random()*4|0]});
  }
  if(S.san<20)flowers=flowers.slice(0,Math.max(0,flowers.length-3));

  // ─ Budget warning ─
  if(R.coin<0){msg('Running low on coins!','warn');}

  clampStats();clampResources();checkPhase();rollEvent();rollRaid();checkWinLose();updateHUD();
}

// ── DEFENSE & RAIDS ──
function getDefenseScore(){
  let score=0;
  for(const b of buildings){if(b.built<1)continue;const lv=b.level||1;
    if(BD[b.type].defense)score+=BD[b.type].defense*lv;
    if(b.type==='watchtower')score+=10*lv;
  }
  // Guards add defense
  score+=villagers.filter(v=>v.prof==='guard').length*8;
  // Education helps (community vigilance)
  score+=Math.floor(getEduLevel()*0.1);
  return score;
}

function rollRaid(){
  // Raids only start once village is established
  const totalRes=R.coin+(R.wood||0)*2+(R.food||0)*3+(R.stone||0)*2;
  if(S.pop<15||totalRes<400)return;
  // Chance increases with wealth and decreases with defense
  const def=getDefenseScore();
  const wealth=totalRes/200; // higher = more attractive target
  let raidChance=0.08+wealth*0.01-def*0.003;
  raidChance=Math.max(0.02,Math.min(0.3,raidChance));
  if(Math.random()>raidChance)return;
  // Raid happens!
  const raidStr=10+Math.floor(S.month*0.3)+Math.floor(Math.random()*15);
  const defStr=def+Math.floor(Math.random()*10);
  if(defStr>=raidStr){
    // Raid repelled!
    msg('Bandits attacked but were repelled! (Defense: '+def+')','good');
    // Guards may get hurt
    const guards=villagers.filter(v=>v.prof==='guard');
    for(const g of guards){if(Math.random()<0.15){g.hp-=15;if(g.hp<=0)msg('A guard was killed defending the village!','bad');}}
  }else{
    // Raid succeeds — steal resources
    const severity=(raidStr-defStr)/raidStr;
    const coinLoss=Math.min(R.coin,Math.floor(R.coin*severity*0.4));
    const foodLoss=Math.min(R.food||0,Math.floor((R.food||0)*severity*0.3));
    const woodLoss=Math.min(R.wood||0,Math.floor((R.wood||0)*severity*0.2));
    R.coin-=coinLoss;R.food-=foodLoss;R.wood-=woodLoss;
    msg('Bandits raided the village! Lost '+coinLoss+' coins, '+foodLoss+' food, '+woodLoss+' wood','bad');
    // May injure villagers
    const injured=Math.floor(severity*3);
    for(let i=0;i<injured&&i<villagers.length;i++){
      const v=villagers[Math.floor(Math.random()*villagers.length)];
      v.hp-=10+Math.floor(Math.random()*15);
      if(v.hp<=0)msg('A villager was killed in the raid!','bad');
    }
    // May damage a building
    if(severity>0.3&&Math.random()<0.4){
      const targets=buildings.filter(b=>b.built>=1&&!['palisade','guardpost','barracks','armory','watchtower'].includes(b.type));
      if(targets.length>0){const t=targets[Math.floor(Math.random()*targets.length)];t.hp-=25+Math.floor(severity*20);
        if(t.hp<=0){msg(BD[t.type].nm+' destroyed by raiders!','bad');buildings=buildings.filter(x=>x!==t);}
        else msg(BD[t.type].nm+' damaged by raiders!','warn');
      }
    }
    // Low defense warning
    if(def<15)msg('Build Palisade Walls, Guard Posts, or Barracks for protection!','warn');
  }
}

function clampStats(){S.san=clamp(S.san,0,100);S.waterQ=clamp(S.waterQ,0,100);S.od=clamp(S.od,0,100);S.disease=clamp(S.disease,0,100);S.helm=clamp(S.helm,0,100);}

// ══ PHASES ══
function checkPhase(){
  for(let i=PHASES.length-1;i>=0;i--){
    if(PHASES[i].unlock()){
      if(i>S.phase){S.phase=i;msg('Phase '+(i+1)+': '+PHASES[i].nm+' unlocked!','good');updateBuildBar();}
      break;
    }
  }
  document.getElementById('phase-banner').textContent='Phase '+(S.phase+1)+': '+PHASES[S.phase].nm;
}

// ══ EVENTS ══
function rollEvent(){
  if(S.month<5)return;
  if(Math.random()>0.25)return; // 25% chance per month
  const evts=[
    {p:0.3,c:()=>S.waterQ<35,t:'Cholera Outbreak!',m:'Contaminated water is killing people.',ch:[{n:'Boil water order',d:'Costs 150 coins',fn:()=>{R.coin-=150;S.disease+=5;return'Limited the damage.'}},{n:'Do nothing',d:'Disease+20',fn:()=>{S.disease+=20;villagers.forEach(v=>{if(Math.random()<0.15)v.hp=0;});return'Devastating losses.';}}]},
    {p:0.25,c:()=>S.month%12>4&&S.month%12<9,t:'Flooding!',m:'Heavy rains are destroying infrastructure.',ch:[{n:'Sandbag defenses',d:'Costs 200 coins, 10 wood',fn:()=>{if(R.coin<200||R.wood<10)return'Not enough resources!';R.coin-=200;R.wood-=10;S.waterQ-=5;return'Sandbags held!';}},{n:'Evacuate',d:'Lose 1 building',fn:()=>{const b=buildings.find(b=>b.built>=1);if(b){msg(BD[b.type].nm+' lost!','bad');buildings=buildings.filter(x=>x!==b);}S.waterQ-=10;return'Safe but infrastructure lost.';}}]},
    {p:0.2,c:()=>S.helm>30,t:'Worm Epidemic!',m:'Children are suffering from parasites.',ch:[{n:'Mass deworming',d:'Costs 300 coins',fn:()=>{if(R.coin<300)return'Not enough!';R.coin-=300;S.helm=Math.max(0,S.helm-20);return'Treatment successful!';}},{n:'Ignore',d:'Worms+15, Disease+10',fn:()=>{S.helm+=15;S.disease+=10;return'The epidemic worsens.';}}]},
    {p:0.15,c:()=>S.pop>=10,t:'Trader Arrives!',m:'A merchant caravan passes through.',ch:[{n:'Trade food for coins',d:'Sell 20 food for 200 coins',fn:()=>{if(R.food<20)return'Not enough food!';R.food-=20;R.coin+=200;return'+200 coins!';}},{n:'Buy supplies',d:'Pay 100 coins for 15 food + 10 water',fn:()=>{if(R.coin<100)return'Not enough coins!';R.coin-=100;R.food+=15;R.water+=10;return'Supplies purchased!';}}]},
    {p:0.1,c:()=>S.san>40,t:'NGO Visit!',m:'An NGO has noticed your progress.',ch:[{n:'Accept aid',d:'+500 coins, +20 wood',fn:()=>{R.coin+=500;R.wood+=20;return'Aid received!';}}]},
    {p:0.15,c:()=>S.pop>=20&&getDefenseScore()<20,t:'Bandit Scouts!',m:'Scouts have been spotted watching the village. An attack may come soon.',ch:[{n:'Hire mercenaries',d:'Pay 300 coins for temporary protection',fn:()=>{if(R.coin<300)return'Not enough coins!';R.coin-=300;msg('Mercenaries will protect the village this month.','good');return'Mercenaries hired!';}},{n:'Build defenses',d:'No cost — reminder to build protection',fn:()=>{return'Build Palisade Walls, Guard Posts, or Barracks from the Protection tab.';}}]},
  ];
  for(const e of evts){if(e.c&&!e.c())continue;if(Math.random()<e.p){showCrisis(e);return;}}
}

function showCrisis(e){
  const prev=speed;setSpeed(0);
  document.getElementById('m-event-c').innerHTML=`<h2>${e.t}</h2><p>${e.m}</p>${e.ch.map((c,i)=>`<div class="choice" onclick="resolveCrisis(${i})"><div style="display:flex;justify-content:space-between"><span class="cn">${c.n}</span></div><div class="cd">${c.d}</div></div>`).join('')}`;
  document.getElementById('m-event').classList.add('show');
  window._crisis=e;window._crisisSpeed=prev;
}
window.resolveCrisis=function(i){
  const e=window._crisis;if(!e)return;
  const r=e.ch[i].fn();
  document.getElementById('m-event').classList.remove('show');
  msg(r,'info');clampStats();updateHUD();setSpeed(window._crisisSpeed||1);
};

// ══ WIN / LOSE ══
function checkWinLose(){
  if(S.pop<=0&&S.month>2){
    setSpeed(0);
    document.getElementById('m-event-c').innerHTML=`<h2>Village Collapsed</h2><p>Everyone has died or fled. ${S.deaths} total deaths in ${S.month} months.</p><button class="pbtn" onclick="location.reload()">Retry</button>`;
    document.getElementById('m-event').classList.add('show');
  }
  if(S.pop>=50&&S.disease<10&&S.od<10&&S.waterQ>70&&S.san>60){
    setSpeed(0);
    document.getElementById('m-event-c').innerHTML=`<h2>Maji Village Thrives!</h2><p>${S.pop} villagers live with clean water and dignity after ${S.month} months. Deaths: ${S.deaths}.</p><button class="pbtn" onclick="location.reload()">Play Again</button>`;
    document.getElementById('m-event').classList.add('show');
  }
}

// ══ RENDERING ══
function resize(){dpr=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';X.setTransform(dpr,0,0,dpr,0,0);}

// ── SEASON PALETTE (computed each frame for smooth transitions) ──
let SEA={id:'cool',grass1:'#5a9a40',grass2:'#4a8830',grass3:'#3a6a22',blade:'rgba(70,120,35,0.15)',
  leaf:'#2d6b1e',leafHi:'#3d8b2e',leafChop:'#4a8a1e',bank:'#4a7a28',
  forestBG:'rgba(20,50,15,0.15)',bushCol:'#3a7a2a',bushHi:'#4a8a3a',bushLo:'#2a6a1a',
  reedCol:'#4a7a2a',shoreCol:'#6a8a4a',cloudAlpha:0.08,riverW:1,lakeScale:1,snow:false,
  rainOn:false,overlayCol:'rgba(0,0,0,0)',dustOn:false};
function updateSeasonPalette(){
  const mo=((S.month-1)%12)+1;
  const s=[12,1,2].includes(mo)?'hot':[3,4].includes(mo)?'cool':[5,6,7,8].includes(mo)?'wet':'dry';
  SEA.id=s;
  if(s==='wet'){
    SEA.grass1='#4aaa48';SEA.grass2='#3a9838';SEA.grass3='#2a7a22';SEA.blade='rgba(50,140,40,0.18)';
    SEA.leaf='#1d7a18';SEA.leafHi='#2d9a28';SEA.leafChop='#3a9a18';SEA.bank='#3a8a28';
    SEA.forestBG='rgba(15,60,12,0.2)';SEA.bushCol='#2a8a22';SEA.bushHi='#3a9a32';SEA.bushLo='#1a7a12';
    SEA.reedCol='#3a8a22';SEA.shoreCol='#5a9a42';SEA.cloudAlpha=0.18;SEA.riverW=1.15;SEA.lakeScale=1.1;
    SEA.snow=false;SEA.rainOn=true;SEA.overlayCol='rgba(40,60,80,0.06)';SEA.dustOn=false;
  }else if(s==='hot'){
    SEA.grass1='#8a9a40';SEA.grass2='#7a8830';SEA.grass3='#6a7a22';SEA.blade='rgba(120,110,40,0.12)';
    SEA.leaf='#5a7a1e';SEA.leafHi='#6a8a2e';SEA.leafChop='#7a9a1e';SEA.bank='#6a8a28';
    SEA.forestBG='rgba(40,50,15,0.12)';SEA.bushCol='#5a7a2a';SEA.bushHi='#6a8a3a';SEA.bushLo='#4a6a1a';
    SEA.reedCol='#6a8a3a';SEA.shoreCol='#8a9a5a';SEA.cloudAlpha=0.04;SEA.riverW=0.85;SEA.lakeScale=0.88;
    SEA.snow=false;SEA.rainOn=false;SEA.overlayCol='rgba(120,80,20,0.06)';SEA.dustOn=true;
  }else if(s==='dry'){
    SEA.grass1='#7a9a38';SEA.grass2='#6a8828';SEA.grass3='#5a7020';SEA.blade='rgba(100,100,35,0.13)';
    SEA.leaf='#4a7a1a';SEA.leafHi='#5a8a2a';SEA.leafChop='#6a9a1a';SEA.bank='#5a8a28';
    SEA.forestBG='rgba(30,45,12,0.13)';SEA.bushCol='#4a7a28';SEA.bushHi='#5a8a38';SEA.bushLo='#3a6a18';
    SEA.reedCol='#5a7a2a';SEA.shoreCol='#7a8a4a';SEA.cloudAlpha=0.05;SEA.riverW=0.9;SEA.lakeScale=0.93;
    SEA.snow=false;SEA.rainOn=false;SEA.overlayCol='rgba(80,60,20,0.04)';SEA.dustOn=true;
  }else{ // cool
    SEA.grass1='#5a9a40';SEA.grass2='#4a8830';SEA.grass3='#3a6a22';SEA.blade='rgba(70,120,35,0.15)';
    SEA.leaf='#2d6b1e';SEA.leafHi='#3d8b2e';SEA.leafChop='#4a8a1e';SEA.bank='#4a7a28';
    SEA.forestBG='rgba(20,50,15,0.15)';SEA.bushCol='#3a7a2a';SEA.bushHi='#4a8a3a';SEA.bushLo='#2a6a1a';
    SEA.reedCol='#4a7a2a';SEA.shoreCol='#6a8a4a';SEA.cloudAlpha=0.1;SEA.riverW=1;SEA.lakeScale=1;
    SEA.snow=true;SEA.rainOn=false;SEA.overlayCol='rgba(60,80,120,0.04)';SEA.dustOn=false;
  }
}
let raindrops=[];

function render(){
  try{
  updateSeasonPalette();
  X.clearRect(0,0,W,H);
  drawGround();drawMountains();drawLakes();drawTradeRoad();drawRiver();drawDenseForestBG();drawODZones();drawFlowers();drawPaths();drawPipes();drawMarketplace();

  // Depth-sort everything
  const drawables=[];
  for(const t of trees)drawables.push({y:t.y,type:'tree',d:t});
  for(const bb of berryBushes)drawables.push({y:bb.y,type:'bush',d:bb});
  for(const r of rocks)drawables.push({y:r.y,type:'rock',d:r});
  for(const h of huts)drawables.push({y:h.y,type:'hut',d:h});
  for(const b of buildings)drawables.push({y:b.y,type:'building',d:b});
  for(const v of villagers)drawables.push({y:v.y,type:'villager',d:v});
  for(const a of animals)drawables.push({y:a.y,type:'animal',d:a});
  for(const tr of traders)drawables.push({y:tr.y,type:'trader',d:tr});
  drawables.sort((a,b)=>a.y-b.y);
  for(const d of drawables){
    try{
    if(d.type==='tree')drawTree(d.d);
    else if(d.type==='bush')drawBerryBush(d.d);
    else if(d.type==='rock')drawRock(d.d);
    else if(d.type==='hut')drawHut(d.d);
    else if(d.type==='building')drawBuilding(d.d);
    else if(d.type==='villager')drawVillager(d.d);
    else if(d.type==='animal')drawAnimal(d.d);
    else if(d.type==='trader')drawTrader(d.d);
    }catch(err){console.error('Draw error:',d.type,err);}
  }
  drawClouds();
  drawWeather();
  // Season overlay tint
  if(SEA.overlayCol!=='rgba(0,0,0,0)'){X.fillStyle=SEA.overlayCol;X.fillRect(0,0,W,H);}
  drawBuildGhost();
  drawSelectionRing();
  }catch(err){console.error('Render error:',err);}
}

function drawGround(){
  const g=X.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.6);
  g.addColorStop(0,SEA.grass1);g.addColorStop(0.5,SEA.grass2);g.addColorStop(1,SEA.grass3);
  X.fillStyle=g;X.fillRect(0,0,W,H);
  // Grass blades
  X.fillStyle=SEA.blade;
  const bladeH=SEA.id==='wet'?3.5:SEA.id==='hot'?1.8:2.5;
  for(let i=0;i<200;i++){const gx=(i*97+13)%W,gy=(i*73+37)%H;X.fillRect(gx,gy,1,bladeH+Math.sin(tick*0.02+i)*1);}
  // Dry season: scattered dry patches
  if(SEA.id==='hot'||SEA.id==='dry'){
    X.fillStyle=SEA.id==='hot'?'rgba(160,140,80,0.08)':'rgba(140,130,70,0.05)';
    for(let i=0;i<30;i++){const px=(i*131+47)%W,py=(i*89+31)%H,pr=15+((i*37)%20);
      X.beginPath();X.ellipse(px,py,pr,pr*0.6,i*0.3,0,Math.PI*2);X.fill();}
  }
  // Wet season: puddles
  if(SEA.id==='wet'){
    X.fillStyle='rgba(60,120,160,0.08)';
    for(let i=0;i<15;i++){const px=(i*173+53)%W,py=(i*127+41)%H,pr=8+((i*29)%12);
      X.beginPath();X.ellipse(px,py,pr,pr*0.5,0,0,Math.PI*2);X.fill();}
  }
  // Market clearing
  const cp=ts({x:0.5,y:0.5});const mrad=scl(0.022);
  const eg=X.createRadialGradient(cp.x,cp.y,0,cp.x,cp.y,mrad);
  eg.addColorStop(0,'#b89868');eg.addColorStop(0.7,'#a08050');eg.addColorStop(1,SEA.grass2);
  X.fillStyle=eg;X.beginPath();X.arc(cp.x,cp.y,mrad,0,Math.PI*2);X.fill();
}

function drawRiver(){
  const q=S.waterQ;
  let r2,g2,b2;
  if(q<30){r2=110;g2=80+q;b2=50+q*2;}else if(q<60){r2=70;g2=100+q;b2=120+q;}else{r2=40;g2=120+q*0.5;b2=160+q*0.5;}
  const rw=scl(0.016)*SEA.riverW;
  X.strokeStyle=`rgb(${r2|0},${g2|0},${b2|0})`;X.lineWidth=rw;X.lineCap='round';
  X.beginPath();let p0=ts(riverPts[0]);X.moveTo(p0.x,p0.y);
  for(let i=1;i<riverPts.length;i++){const p=ts(riverPts[i]);X.lineTo(p.x,p.y);}X.stroke();
  // Banks
  X.strokeStyle=SEA.bank;X.lineWidth=rw+scl(0.003);
  X.globalCompositeOperation='destination-over';
  X.beginPath();p0=ts(riverPts[0]);X.moveTo(p0.x,p0.y);
  for(let i=1;i<riverPts.length;i++){const p=ts(riverPts[i]);X.lineTo(p.x,p.y);}X.stroke();
  X.globalCompositeOperation='source-over';
  // Water shimmer
  if(q>35){
    X.strokeStyle=`rgba(${Math.min(255,r2+50)},${Math.min(255,g2+50)},${Math.min(255,b2+50)},0.3)`;X.lineWidth=1.5;
    for(let i=2;i<riverPts.length-2;i+=2){const p=ts(riverPts[i]);const w=Math.sin(tick*0.04+i)*scl(0.003);
      X.beginPath();X.moveTo(p.x-scl(0.004)+w,p.y);X.lineTo(p.x+scl(0.004)+w,p.y);X.stroke();}
  }
  // Sparkles on clean water
  if(q>55){X.fillStyle='rgba(255,255,255,0.5)';
    for(let i=0;i<riverPts.length;i+=4)if(Math.sin(tick*0.05+i*2.5)>0.85){const p=ts(riverPts[i]);X.beginPath();X.arc(p.x+Math.sin(tick*0.07+i)*scl(0.002),p.y,2,0,Math.PI*2);X.fill();}}
  // Blood particles flowing down river
  for(const bp of bloodParticles){
    const pp=ts(bp);
    const alpha=Math.max(0,1-bp.age/bp.maxAge);
    const spread=bp.age*0.003;
    X.fillStyle=`rgba(180,20,20,${(alpha*0.7).toFixed(2)})`;
    X.beginPath();X.arc(pp.x,pp.y,bp.sz+spread,0,Math.PI*2);X.fill();
    // Darker core
    X.fillStyle=`rgba(120,0,0,${(alpha*0.5).toFixed(2)})`;
    X.beginPath();X.arc(pp.x,pp.y,bp.sz*0.5,0,Math.PI*2);X.fill();
  }
}

function drawODZones(){
  for(const od of odZones){const p=ts(od);const sz=scl(od.size);
    const gr=X.createRadialGradient(p.x,p.y,0,p.x,p.y,sz);
    gr.addColorStop(0,'rgba(100,60,20,0.3)');gr.addColorStop(1,'rgba(100,60,20,0)');
    X.fillStyle=gr;X.beginPath();X.arc(p.x,p.y,sz,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(80,50,10,0.15)';X.lineWidth=1;
    for(let i=0;i<2;i++){const sx=p.x+(i-0.5)*scl(0.003),w=Math.sin(tick*0.05+i*2)*scl(0.002);
    X.beginPath();X.moveTo(sx,p.y);X.quadraticCurveTo(sx+w,p.y-scl(0.004),sx-w,p.y-scl(0.008));X.stroke();}
  }
}
function drawMountains(){
  for(const m of mountains){const p=ts(m);const h=scl(m.h);const w=scl(m.w);
    // Mountain shadow
    X.fillStyle='rgba(0,0,0,0.06)';X.beginPath();X.ellipse(p.x+w*0.2,p.y+h*0.05,w*1.3,h*0.15,0,0,Math.PI*2);X.fill();
    // Mountain body
    X.fillStyle='#6a6a5a';X.beginPath();X.moveTo(p.x,p.y-h);X.lineTo(p.x-w*1.2,p.y);X.lineTo(p.x+w*1.2,p.y);X.closePath();X.fill();
    // Lighter face
    X.fillStyle='#7a7a6a';X.beginPath();X.moveTo(p.x,p.y-h);X.lineTo(p.x+w*0.2,p.y-h*0.3);X.lineTo(p.x+w*1.2,p.y);X.closePath();X.fill();
    // Snow cap — more snow in cool season, melts in hot
    const snowShow=SEA.snow?true:(SEA.id==='wet'?m.snow:false);
    const snowScale=SEA.snow?0.4:(SEA.id==='wet'?0.3:0.3);
    if(snowShow||m.snow){X.fillStyle=SEA.id==='hot'?'rgba(232,232,240,0.3)':'#e8e8f0';X.beginPath();X.moveTo(p.x,p.y-h);X.lineTo(p.x-w*snowScale,p.y-h*(SEA.snow?0.55:0.7));X.lineTo(p.x+w*snowScale,p.y-h*(SEA.snow?0.55:0.7));X.closePath();X.fill();}
    // Rock texture lines
    X.strokeStyle='rgba(50,50,40,0.15)';X.lineWidth=0.8;
    for(let i=1;i<=3;i++){const t=i/4;X.beginPath();X.moveTo(p.x-w*(1.2-t*0.8),p.y-h*t*0.2);X.lineTo(p.x+w*(1.2-t*0.6),p.y-h*t*0.3);X.stroke();}
  }
}
function drawLakes(){
  for(const l of lakes){const p=ts(l);const r=scl(l.r)*SEA.lakeScale;
    // Lake bed
    X.fillStyle='rgba(40,80,60,0.2)';X.beginPath();X.ellipse(p.x+r*0.1,p.y+r*0.1,r*1.15,r*0.6,0,0,Math.PI*2);X.fill();
    // Water
    const d=l.depth;
    X.fillStyle=`rgba(${40+30*d|0},${100+60*d|0},${140+80*d|0},0.85)`;
    X.beginPath();X.ellipse(p.x,p.y,r,r*0.5,0,0,Math.PI*2);X.fill();
    // Shore
    X.strokeStyle=SEA.shoreCol;X.lineWidth=scl(0.002);X.beginPath();X.ellipse(p.x,p.y,r*1.05,r*0.55,0,0,Math.PI*2);X.stroke();
    // Shimmer
    X.fillStyle='rgba(255,255,255,0.15)';
    for(let i=0;i<3;i++){const sx=p.x+(i-1)*r*0.4,sy=p.y+Math.sin(tick*0.03+i*2)*r*0.1;
      X.beginPath();X.ellipse(sx,sy,r*0.12,r*0.03,0.3+Math.sin(tick*0.02)*0.2,0,Math.PI*2);X.fill();}
    // Reeds at edges
    X.strokeStyle=SEA.reedCol;X.lineWidth=1;
    for(let i=0;i<4;i++){const a=i/4*Math.PI*2+0.5;const rx=p.x+Math.cos(a)*r*0.9,ry=p.y+Math.sin(a)*r*0.45;
      const sw=Math.sin(tick*0.015+i)*scl(0.001);
      X.beginPath();X.moveTo(rx,ry);X.quadraticCurveTo(rx+sw,ry-scl(0.006),rx+sw*0.5,ry-scl(0.01));X.stroke();}
  }
}
function drawDenseForestBG(){
  for(const df of denseForests){const p=ts(df);const r=scl(df.r);
    // Dark undergrowth
    X.fillStyle=SEA.forestBG;X.beginPath();X.ellipse(p.x,p.y,r*1.1,r*0.7,0,0,Math.PI*2);X.fill();
  }
}
function drawTradeRoad(){
  if(tradeRoad.length<2)return;
  // Dirt path from map edge to village
  X.strokeStyle='rgba(160,140,110,0.35)';X.lineWidth=scl(0.006);X.lineCap='round';X.lineJoin='round';
  X.beginPath();let p0=ts(tradeRoad[0]);X.moveTo(p0.x,p0.y);
  for(let i=1;i<tradeRoad.length;i++){const p=ts(tradeRoad[i]);X.lineTo(p.x,p.y);}X.stroke();
  // Road edges
  X.strokeStyle='rgba(100,80,50,0.15)';X.lineWidth=scl(0.008);
  X.beginPath();p0=ts(tradeRoad[0]);X.moveTo(p0.x,p0.y);
  for(let i=1;i<tradeRoad.length;i++){const p=ts(tradeRoad[i]);X.lineTo(p.x,p.y);}
  X.globalCompositeOperation='destination-over';X.stroke();X.globalCompositeOperation='source-over';
  // Road stones (if road buildings exist)
  const roadCount=countBuilt('road');
  if(roadCount>0){
    X.fillStyle='rgba(140,120,90,0.25)';
    for(let i=0;i<tradeRoad.length;i+=2){const p=ts(tradeRoad[i]);
      X.beginPath();X.ellipse(p.x,p.y,scl(0.002),scl(0.001),0,0,Math.PI*2);X.fill();}
  }
}
function drawTrader(tr){
  const p=ts(tr);const sz=scl(0.005);const kind=tr.kind||'backpacker';
  const dw=Math.sin(tick*0.06)*sz*0.1;
  if(kind==='backpacker'){
    // Shadow
    X.fillStyle='rgba(0,0,0,0.1)';X.beginPath();X.ellipse(p.x,p.y+sz*0.3,sz*0.5,sz*0.1,0,0,Math.PI*2);X.fill();
    // Legs
    X.strokeStyle='#5a4a3a';X.lineWidth=sz*0.12;X.lineCap='round';
    X.beginPath();X.moveTo(p.x-sz*0.12,p.y+sz*0.05);X.lineTo(p.x-sz*0.15+dw,p.y+sz*0.45);X.stroke();
    X.beginPath();X.moveTo(p.x+sz*0.12,p.y+sz*0.05);X.lineTo(p.x+sz*0.15-dw,p.y+sz*0.45);X.stroke();
    // Body
    X.fillStyle='#c0783a';X.fillRect(p.x-sz*0.18,p.y-sz*0.4,sz*0.36,sz*0.5);
    // Head
    X.fillStyle='#8d5524';X.beginPath();X.arc(p.x,p.y-sz*0.55,sz*0.18,0,Math.PI*2);X.fill();
    // Headband
    X.fillStyle='#e84040';X.fillRect(p.x-sz*0.19,p.y-sz*0.6,sz*0.38,sz*0.06);
    // Backpack (big!)
    X.fillStyle='#7a5a30';X.fillRect(p.x-sz*0.3,p.y-sz*0.45,sz*0.15,sz*0.45);
    X.strokeStyle='#5a3a10';X.lineWidth=1;X.strokeRect(p.x-sz*0.3,p.y-sz*0.45,sz*0.15,sz*0.45);
    // Bedroll on top of pack
    X.fillStyle='#b0a080';X.beginPath();X.ellipse(p.x-sz*0.22,p.y-sz*0.52,sz*0.1,sz*0.06,0.3,0,Math.PI*2);X.fill();
    // Walking stick
    X.strokeStyle='#6a4a2a';X.lineWidth=1.5;X.beginPath();X.moveTo(p.x+sz*0.25,p.y-sz*0.3);X.lineTo(p.x+sz*0.35,p.y+sz*0.45);X.stroke();
  }else if(kind==='cart'){
    // Shadow
    X.fillStyle='rgba(0,0,0,0.1)';X.beginPath();X.ellipse(p.x,p.y+sz*0.3,sz*1.0,sz*0.15,0,0,Math.PI*2);X.fill();
    // Donkey pulling cart
    X.fillStyle='#8a7a6a';X.beginPath();X.ellipse(p.x+sz*0.6,p.y-sz*0.1,sz*0.4,sz*0.2,0,0,Math.PI*2);X.fill();
    X.fillStyle='#7a6a5a';X.beginPath();X.ellipse(p.x+sz*0.9,p.y-sz*0.22,sz*0.12,sz*0.1,0.3,0,Math.PI*2);X.fill();
    // Donkey legs
    X.strokeStyle='#6a5a4a';X.lineWidth=sz*0.08;X.lineCap='round';
    X.beginPath();X.moveTo(p.x+sz*0.45,p.y+sz*0.08);X.lineTo(p.x+sz*0.45+dw,p.y+sz*0.42);X.stroke();
    X.beginPath();X.moveTo(p.x+sz*0.75,p.y+sz*0.08);X.lineTo(p.x+sz*0.75-dw,p.y+sz*0.42);X.stroke();
    // Donkey ears
    X.strokeStyle='#8a7a6a';X.lineWidth=sz*0.05;
    X.beginPath();X.moveTo(p.x+sz*0.95,p.y-sz*0.28);X.lineTo(p.x+sz*1.0,p.y-sz*0.45);X.stroke();
    X.beginPath();X.moveTo(p.x+sz*0.87,p.y-sz*0.28);X.lineTo(p.x+sz*0.85,p.y-sz*0.45);X.stroke();
    // Harness
    X.strokeStyle='#5a3a1a';X.lineWidth=sz*0.04;X.beginPath();X.moveTo(p.x+sz*0.35,p.y);X.lineTo(p.x+sz*0.1,p.y);X.stroke();
    // Cart body
    X.fillStyle='#a07030';X.fillRect(p.x-sz*0.7,p.y-sz*0.25,sz*0.8,sz*0.35);
    X.strokeStyle='#6a4a20';X.lineWidth=1.5;X.strokeRect(p.x-sz*0.7,p.y-sz*0.25,sz*0.8,sz*0.35);
    // Cart sides (planks)
    X.strokeStyle='#8a6020';X.lineWidth=0.8;
    for(let i=0;i<4;i++)X.beginPath(),X.moveTo(p.x-sz*0.7+i*sz*0.2,p.y-sz*0.25),X.lineTo(p.x-sz*0.7+i*sz*0.2,p.y+sz*0.1),X.stroke();
    // Wheel
    X.strokeStyle='#4a3a2a';X.lineWidth=sz*0.08;X.beginPath();X.arc(p.x-sz*0.55,p.y+sz*0.25,sz*0.18,0,Math.PI*2);X.stroke();
    X.beginPath();X.arc(p.x-sz*0.1,p.y+sz*0.25,sz*0.18,0,Math.PI*2);X.stroke();
    // Spokes
    for(let w of [-0.55,-0.1]){for(let a=0;a<4;a++){const ang=a*Math.PI/2+tick*0.02;X.lineWidth=0.8;X.beginPath();X.moveTo(p.x+sz*w,p.y+sz*0.25);X.lineTo(p.x+sz*w+Math.cos(ang)*sz*0.16,p.y+sz*0.25+Math.sin(ang)*sz*0.16);X.stroke();}}
    // Goods on cart
    X.fillStyle='#d4a060';X.fillRect(p.x-sz*0.6,p.y-sz*0.42,sz*0.25,sz*0.2);
    X.fillStyle='#c09050';X.fillRect(p.x-sz*0.3,p.y-sz*0.38,sz*0.2,sz*0.16);
    X.fillStyle='#e0c090';X.beginPath();X.arc(p.x-sz*0.15,p.y-sz*0.35,sz*0.08,0,Math.PI*2);X.fill();
    // Driver walking beside
    X.fillStyle='#8d5524';X.beginPath();X.arc(p.x+sz*0.3,p.y-sz*0.55,sz*0.15,0,Math.PI*2);X.fill();
    X.fillStyle='#2a6a3a';X.fillRect(p.x+sz*0.18,p.y-sz*0.4,sz*0.24,sz*0.4);
    // Straw hat
    X.fillStyle='#e8d878';X.beginPath();X.ellipse(p.x+sz*0.3,p.y-sz*0.68,sz*0.2,sz*0.06,0,0,Math.PI*2);X.fill();
  }else if(kind==='caravan'){
    // Shadow

function drawFlowers(){
  const flowerAlpha=SEA.id==='wet'?1:SEA.id==='cool'?0.8:SEA.id==='dry'?0.4:0.3;
  const flowerSize=SEA.id==='wet'?2.5:SEA.id==='hot'?1.2:2;
  for(const f of flowers){const p=ts(f);X.globalAlpha=flowerAlpha;X.fillStyle=f.col;X.beginPath();X.arc(p.x,p.y,flowerSize,0,Math.PI*2);X.fill();}
  X.globalAlpha=1;
}
function drawPaths(){

  for(const b of buildings){if(b.built<1)continue;const a=ts(b),c=ts({x:0.5,y:0.5});X.beginPath();X.moveTo(a.x,a.y);X.lineTo(c.x,c.y);X.stroke();}

function drawPipes(){
  for(const pipe of pipes){
    const from=ts(pipe.from),to=ts(pipe.to);
    const progress=pipe.built;
    // Trench line
    X.strokeStyle=progress>=1?'#555':'rgba(100,100,100,0.4)';
    X.lineWidth=scl(0.004);X.lineCap='round';
    if(progress<1){X.setLineDash([scl(0.005),scl(0.005)]);}
    X.beginPath();X.moveTo(from.x,from.y);X.lineTo(from.x+(to.x-from.x)*progress,from.y+(to.y-from.y)*progress);X.stroke();
    X.setLineDash([]);
    // Pipe on top
    if(progress>=1){
      X.strokeStyle='#777';X.lineWidth=scl(0.002);
      X.beginPath();X.moveTo(from.x,from.y);X.lineTo(to.x,to.y);X.stroke();
      // Flow dots
      X.fillStyle='rgba(80,140,200,0.4)';
      for(let i=0;i<5;i++){
        const t=((tick*0.003+i*0.2)%1);
        const fx=from.x+(to.x-from.x)*t,fy=from.y+(to.y-from.y)*t;
        X.beginPath();X.arc(fx,fy,scl(0.001),0,Math.PI*2);X.fill();
      }
    }
    // Progress bar if under construction
    if(progress<1&&progress>0){
      const mid={x:(from.x+to.x)/2,y:(from.y+to.y)/2};
      X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(mid.x-scl(0.01),mid.y-scl(0.008),scl(0.02),scl(0.003));
      X.fillStyle='#ffd866';X.fillRect(mid.x-scl(0.01),mid.y-scl(0.008),scl(0.02)*progress,scl(0.003));
    }
  }
  // Pipe mode indicator
  if(pipeMode&&ghostPos){
    const from=ts(pipeMode.from);const to=ts(ghostPos);
    X.strokeStyle='rgba(100,100,255,0.4)';X.lineWidth=scl(0.003);X.setLineDash([scl(0.004),scl(0.004)]);
    X.beginPath();X.moveTo(from.x,from.y);X.lineTo(to.x,to.y);X.stroke();X.setLineDash([]);
  }
}

  X.fillStyle='rgba(80,150,200,0.5)';X.beginPath();X.ellipse(cp.x,cp.y-u*3.6,u*0.6,u*0.25,0,0,Math.PI*2);X.fill();

function drawTree(t){

  if(t.type==='palm'){
    X.strokeStyle='#6b4a2a';X.lineWidth=scl(0.001);

    X.fillStyle=SEA.leaf;for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2+tick*0.006;X.beginPath();X.ellipse(p.x+sw*1.5+Math.cos(a)*scl(0.003),p.y-sz*2+Math.sin(a)*scl(0.0015),scl(0.004),scl(0.001),a,0,Math.PI*2);X.fill();}
  }else{
    X.fillStyle='#5a3a1a';X.fillRect(p.x-scl(0.0006),p.y-sz*0.4,scl(0.0012),sz*0.4);
    X.fillStyle=t.chopping?SEA.leafChop:SEA.leaf;X.beginPath();X.arc(p.x+sw,p.y-sz*0.7,sz*0.45,0,Math.PI*2);X.fill();
    X.fillStyle=SEA.leafHi+'44';X.beginPath();X.arc(p.x+sw+scl(0.0008),p.y-sz*0.85,sz*0.3,0,Math.PI*2);X.fill();

  if(camZ>2.5){X.fillStyle='rgba(255,255,255,0.5)';X.font='8px sans-serif';X.textAlign='center';X.fillText(t.wood,p.x,p.y+10);}

function drawBerryBush(b){
  const p=ts(b);const sz=scl(0.004);

    X.fillStyle='#5a6a3a';X.beginPath();X.arc(p.x,p.y-sz*0.3,sz*0.4,0,Math.PI*2);X.fill();

  }

  X.fillStyle=SEA.bushCol;X.beginPath();X.arc(p.x,p.y-sz*0.4,sz*0.6,0,Math.PI*2);X.fill();
  X.fillStyle=SEA.bushHi;X.beginPath();X.arc(p.x-sz*0.2,p.y-sz*0.55,sz*0.35,0,Math.PI*2);X.fill();

function drawHut(h){
  const p=ts(h);const sz=scl(h.size*0.001);
  const wallR=sz*1.0,wallH=sz*0.6,roofH=sz*1.2;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.1)';X.beginPath();X.ellipse(p.x+sz*0.1,p.y+wallH*0.15,wallR*1.1,wallR*0.35,0,0,Math.PI*2);X.fill();
  // Wall
  X.fillStyle='#b08050';X.beginPath();X.ellipse(p.x,p.y,wallR,wallH,0,0,Math.PI*2);X.fill();
  // Door
  X.fillStyle='#3a2010';X.beginPath();X.ellipse(p.x,p.y+wallH*0.1,wallR*0.25,wallH*0.4,0,0,Math.PI);X.fill();
  // Roof
  X.fillStyle='#a08040';X.beginPath();X.moveTo(p.x,p.y-roofH);X.lineTo(p.x-wallR*1.2,p.y-wallH*0.25);
  X.quadraticCurveTo(p.x,p.y-wallH*0.02,p.x+wallR*1.2,p.y-wallH*0.25);X.closePath();X.fill();
  // Thatch lines
  X.strokeStyle='rgba(0,0,0,0.08)';X.lineWidth=0.8;
  for(let i=1;i<=4;i++){const t=i/5;const ly=p.y-roofH+(p.y-wallH*0.25-(p.y-roofH))*t;
    const lx=p.x+((-wallR*1.2)-0)*t;const rx=p.x+(wallR*1.2)*t;
    X.beginPath();X.moveTo(lx,ly);X.quadraticCurveTo(p.x,ly+sz*0.08,rx,ly);X.stroke();}
  // Cap
  X.fillStyle='#6a5030';X.beginPath();X.arc(p.x,p.y-roofH,sz*0.06,0,Math.PI*2);X.fill();
}

function drawBuilding(b){
  const bd=BD[b.type];if(!bd)return;
  const p=ts(b);const sc=Math.min(1,b.built);
  // Shadow
  X.fillStyle='rgba(0,0,0,0.1)';X.beginPath();X.ellipse(p.x+scl(0.002),p.y+scl(0.002),scl(0.01)*sc,scl(0.003)*sc,0,0,Math.PI*2);X.fill();

  if(b.built<1){
    // Construction wireframe
    X.globalAlpha=0.4+b.built*0.6;
    X.strokeStyle=bd.col;X.lineWidth=1.5;X.setLineDash([3,3]);
    X.strokeRect(p.x-scl(0.008)*sc,p.y-scl(0.012)*sc,scl(0.016)*sc,scl(0.012)*sc);
    X.setLineDash([]);
    // Progress bar
    X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(p.x-scl(0.01),p.y+scl(0.005),scl(0.02),scl(0.003));
    X.fillStyle='#ffd866';X.fillRect(p.x-scl(0.01),p.y+scl(0.005),scl(0.02)*b.built,scl(0.003));
    X.globalAlpha=1;
    return;
  }

  // Dispatch to specific drawing
  const fn={latrine:drawLatrine,well:drawWell,compost:drawCompost,school:drawSchool,clinic:drawClinic,drain:drawDrain,sewer:drawSewer,farm:drawFarm,vegfarm:drawVegFarm,orchard:drawOrchard,chickencoop:drawChickenCoop,dairyfarm:drawDairyFarm,cheesemaker:drawCheeseMaker,gathererhut:drawGathererHut,treatment:drawTreatment,hut:drawBuiltHut,brickhouse:drawBrickHouse,granary:drawGranary,watchtower:drawWatchtower,market:drawMarket,church:drawChurch,pottery:drawPottery,forestryhut:drawForestryHut,hunterhut:drawHunterHut,biogas:drawBiogas,tradingpost:drawTradingPost,workshop:drawWorkshop,inn:drawInn,road:drawRoad,reservoir:drawReservoir,fishinghut:drawFishingHut,palisade:drawPalisade,guardpost:drawGuardPost,barracks:drawBarracks,armory:drawArmory,marketplace:drawMarketStall,claypit:drawClayPit,quarry:drawQuarry};
  if(fn[b.type])fn[b.type](p,sc,b);
  // Level badge
  if((b.level||1)>1){X.fillStyle='#ffd866';X.font='bold 9px sans-serif';X.textAlign='center';X.fillText('Lv'+b.level,p.x,p.y+scl(0.01));}

  // HP bar if damaged
  if(b.hp<100){
    X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(p.x-scl(0.008),p.y-scl(0.018),scl(0.016),scl(0.002));
    X.fillStyle=b.hp>50?'#4caf50':'#ef5350';X.fillRect(p.x-scl(0.008),p.y-scl(0.018),scl(0.016)*b.hp/100,scl(0.002));
  }
}

function drawBuiltHut(p,sc){
  const u=scl(0.004);

  X.fillStyle='#3a2010';X.beginPath();X.ellipse(p.x,p.y+u*0.15,u*0.4,u*0.35,0,0,Math.PI);X.fill();
  X.fillStyle='#a08040';X.beginPath();X.moveTo(p.x,p.y-u*2.2);X.lineTo(p.x-u*2.2,p.y-u*0.4);X.quadraticCurveTo(p.x,p.y-u*0.05,p.x+u*2.2,p.y-u*0.4);X.closePath();X.fill();

function drawLatrine(p,sc,b){
  const u=scl(0.003);
  X.fillStyle='#8B6914';X.fillRect(p.x-u*1.5,p.y-u*3.5,u*3,u*3.5);

function drawVillager(v){

  const walking=v.task!=='idle'&&dist(v,{x:v.tx,y:v.ty})>0.003;
  const legSwing=walking?Math.sin(f*0.6)*sz*0.4:0;

  // Shadow
  X.fillStyle='rgba(0,0,0,0.12)';X.beginPath();X.ellipse(p.x,p.y+sz*0.2,sz*0.5,sz*0.15,0,0,Math.PI*2);X.fill();

  X.beginPath();X.moveTo(p.x+sz*0.15,p.y);X.lineTo(p.x+sz*0.15-legSwing*0.5,p.y+sz*0.5);X.stroke();

  // Feet
  X.fillStyle='#3a2010';
  X.beginPath();X.ellipse(p.x-sz*0.15+legSwing*0.5,p.y+sz*0.55,sz*0.12,sz*0.06,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(p.x+sz*0.15-legSwing*0.5,p.y+sz*0.55,sz*0.12,sz*0.06,0,0,Math.PI*2);X.fill();

  // Body/torso
  X.fillStyle=v.shirt;
  X.fillRect(p.x-sz*0.35,p.y-sz*0.6,sz*0.7,sz*0.7);

  // Wrap/skirt
  X.fillStyle=v.wrap;
  X.fillRect(p.x-sz*0.35,p.y-sz*0.1,sz*0.7,sz*0.2);

function drawSelectionRing(){
  if(!selected||selected.skin)return; // villager ring handled in drawVillager
  // Building selection
  const p=ts(selected);X.strokeStyle='#ffd866';X.lineWidth=2;X.setLineDash([4,4]);
  X.beginPath();X.arc(p.x,p.y,scl(0.015),0,Math.PI*2);X.stroke();X.setLineDash([]);
}

function drawBuildGhost(){
  if(!buildMode||!ghostPos)return;
  const p=ts(ghostPos);const bd=BD[buildMode];
  X.globalAlpha=0.4;X.fillStyle=bd.col;
  X.beginPath();X.arc(p.x,p.y,scl(0.01),0,Math.PI*2);X.fill();
  X.strokeStyle=bd.col;X.lineWidth=1;X.setLineDash([4,4]);
  X.beginPath();X.arc(p.x,p.y,scl(bd.rad),0,Math.PI*2);X.stroke();
  X.setLineDash([]);X.globalAlpha=1;
  X.font='18px sans-serif';X.textAlign='center';X.fillText(bd.ic,p.x,p.y+6);
}

function drawClouds(){
  for(const cl of clouds){cl.x+=cl.sp*speed;if(cl.x>1.2)cl.x=-0.15;
    const p=ts(cl);const s=scl(cl.s)*(SEA.id==='wet'?1.3:SEA.id==='hot'?0.7:1);
    const a=SEA.cloudAlpha;
    const col=SEA.id==='wet'?`rgba(180,190,200,${a})`:`rgba(255,255,255,${a})`;
    X.fillStyle=col;
    X.beginPath();X.arc(p.x,p.y,s*0.4,0,Math.PI*2);X.arc(p.x+s*0.3,p.y-scl(0.001),s*0.3,0,Math.PI*2);
    if(SEA.id==='wet'){X.arc(p.x-s*0.2,p.y+scl(0.0005),s*0.25,0,Math.PI*2);}
    X.fill();}
}

function drawWeather(){
  if(SEA.rainOn){
    // Rain
    X.strokeStyle='rgba(140,180,220,0.25)';X.lineWidth=1;
    for(let i=0;i<80;i++){
      const rx=((tick*2.3+i*137)%W);
      const ry=((tick*4.7+i*91)%H);
      X.beginPath();X.moveTo(rx,ry);X.lineTo(rx-2,ry+8);X.stroke();
    }
    // Splashes on ground
    if(Math.random()<0.3){
      X.fillStyle='rgba(140,180,220,0.1)';
      for(let i=0;i<5;i++){
        const sx=Math.random()*W,sy=Math.random()*H;
        X.beginPath();X.ellipse(sx,sy,3,1,0,0,Math.PI*2);X.fill();
      }
    }
  }
  if(SEA.dustOn){
    // Dust/heat haze particles
    X.fillStyle=SEA.id==='hot'?'rgba(180,160,100,0.06)':'rgba(160,150,100,0.04)';
    for(let i=0;i<25;i++){
      const dx=((tick*0.5+i*173)%W);
      const dy=((i*97+tick*0.3)%H);
      const ds=3+Math.sin(tick*0.01+i)*2;
      X.beginPath();X.arc(dx,dy,ds,0,Math.PI*2);X.fill();
    }
    // Heat shimmer at horizon (subtle wave)
    if(SEA.id==='hot'){
      X.strokeStyle='rgba(200,180,120,0.04)';X.lineWidth=2;
      X.beginPath();
      for(let i=0;i<W;i+=3){
        const hy=H*0.35+Math.sin(i*0.02+tick*0.03)*4;
        if(i===0)X.moveTo(i,hy);else X.lineTo(i,hy);
      }
      X.stroke();
    }
  }
}
